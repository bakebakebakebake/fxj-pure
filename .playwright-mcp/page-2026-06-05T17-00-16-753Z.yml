            - paragraph [ref=e166]:
              - strong [ref=e167]: 复制状态机 = 很多台机器，各自维护一份相同的“业务对象”，并且通过执行同一串命令，让它们始终保持一致。
            - paragraph [ref=e168]: 相同的初始状态+相同的输入=相同的结束状态
            - paragraph [ref=e169]: 但似乎这个描述本来就很直观，但直观并不代表可作为系统设计模型，我们可能已经默认了：
