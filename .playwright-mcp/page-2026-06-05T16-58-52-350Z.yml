          - generic [ref=e533]:
            - heading "Agent基础#" [level=2] [ref=e534]:
              - text: Agent基础
              - link "#" [ref=e535] [cursor=pointer]:
                - /url: "#agent基础"
            - heading "定义与四要素#" [level=3] [ref=e536]:
              - text: 定义与四要素
              - link "#" [ref=e537] [cursor=pointer]:
                - /url: "#定义与四要素"
            - paragraph [ref=e538]:
              - text: 智能体（Agent）是能够通过
              - strong [ref=e539]: 传感器（Sensors）
              - text: 感知所处
              - strong [ref=e540]: 环境（Environment）
              - text: ，并
              - strong [ref=e541]: 自主
              - text: 地通过
              - strong [ref=e542]: 执行器（Actuators）
              - text: 采取
              - strong [ref=e543]: 行动（Action）
              - text: 以达成特定目标的实体。
            - table [ref=e545]:
              - rowgroup [ref=e546]:
                - row "要素 说明 示例" [ref=e547]:
                  - columnheader "要素" [ref=e548]
                  - columnheader "说明" [ref=e549]
                  - columnheader "示例" [ref=e550]
              - rowgroup [ref=e551]:
                - row "环境 智能体所处的外部世界 道路交通、金融市场、游戏场景" [ref=e552]:
                  - cell "环境" [ref=e553]:
                    - strong [ref=e554]: 环境
                  - cell "智能体所处的外部世界" [ref=e555]
                  - cell "道路交通、金融市场、游戏场景" [ref=e556]
                - row "感知 通过传感器持续获取环境状态 摄像头、麦克风、雷达、API 接口" [ref=e557]:
                  - cell "感知" [ref=e558]:
                    - strong [ref=e559]: 感知
                  - cell "通过传感器持续获取环境状态" [ref=e560]
                  - cell "摄像头、麦克风、雷达、API 接口" [ref=e561]
                - row "行动 通过执行器改变环境状态 机械臂动作、代码调用、文本输出" [ref=e562]:
                  - cell "行动" [ref=e563]:
                    - strong [ref=e564]: 行动
                  - cell "通过执行器改变环境状态" [ref=e565]
                  - cell "机械臂动作、代码调用、文本输出" [ref=e566]
                - row "自主性 核心特征，基于感知和内部状态独立决策 自主规划路径而非被动响应指令" [ref=e567]:
                  - cell "自主性" [ref=e568]:
                    - strong [ref=e569]: 自主性
                  - cell "核心特征，基于感知和内部状态独立决策" [ref=e570]
                  - cell "自主规划路径而非被动响应指令" [ref=e571]
            - heading "PEAS 任务环境描述模型#" [level=3] [ref=e572]:
              - text: PEAS 任务环境描述模型
              - link "#" [ref=e573] [cursor=pointer]:
                - /url: "#peas-任务环境描述模型"
            - paragraph [ref=e574]:
              - text: PEAS 是描述 Agent 任务环境的标准化框架，包含四个维度：
              - strong [ref=e575]: P
              - text: erformance（性能度量）、
              - strong [ref=e576]: E
              - text: nvironment（环境）、
              - strong [ref=e577]: A
              - text: ctuators（可采取的动作）、
              - strong [ref=e578]: S
              - text: ensors（可感知的信息来源）。
            - paragraph [ref=e579]: 以自动驾驶为例：Performance 是安全抵达、燃油效率、乘客舒适度；Environment 是道路、交通信号、行人、天气；Actuators 是方向盘、油门、刹车、转向灯；Sensors 是摄像头、激光雷达、GPS、惯性测量单元。
            - heading "六类智能体演进路径#" [level=3] [ref=e580]:
              - text: 六类智能体演进路径
              - link "#" [ref=e581] [cursor=pointer]:
                - /url: "#六类智能体演进路径"
            - paragraph [ref=e582]: 智能体的分类按决策架构从简单到复杂演进：
            - list [ref=e583]:
              - listitem [ref=e584]:
                - paragraph [ref=e585]:
                  - strong [ref=e586]: 简单反射智能体
                  - text: （Simple Reflex Agent）：基于条件-动作规则直接响应当前感知，不维护内部状态。示例：自动恒温器。
              - listitem [ref=e587]:
                - paragraph [ref=e588]:
                  - strong [ref=e589]: 基于模型的反射智能体
                  - text: （Model-based Reflex Agent）：在反射基础上增加内部世界模型，具备初级记忆，能够处理部分可观测环境。示例：隧道中的自动驾驶汽车。
              - listitem [ref=e590]:
                - paragraph [ref=e591]:
                  - strong [ref=e592]: 基于目标的智能体
                  - text: （Goal-based Agent）：在模型基础上增加了对”目标状态”的显式表示，能够主动选择导向目标的行动。示例：GPS 路径规划系统。
              - listitem [ref=e593]:
                - paragraph [ref=e594]:
                  - strong [ref=e595]: 基于效用的智能体
                  - text: （Utility-based Agent）：在目标基础上增加了效用函数，能够在多个目标间进行权衡和优先级排序，选择最大化期望效用的行动。示例：同时考虑时间、油耗、过路费的导航系统。
              - listitem [ref=e596]:
                - paragraph [ref=e597]:
                  - strong [ref=e598]: 学习型智能体
                  - text: （Learning Agent）：包含学习元素，能够通过与环境交互积累经验，持续改进自身性能。所有学习组件包括：学习元素（改进算法）、执行元素（选择行动）、评判元素（提供反馈）、问题生成器（探索新经验）。示例：AlphaGo Zero。
              - listitem [ref=e599]:
                - paragraph [ref=e600]:
                  - strong [ref=e601]: LLM 驱动智能体
                  - text: （LLM-driven Agent）：以预训练大语言模型为”大脑”，具备极强的自然语言理解和泛化能力，能够理解模糊指令，结合规划和工具使用完成复杂任务。示例：智能旅行助手。
            - heading "三类分类维度#" [level=3] [ref=e602]:
              - text: 三类分类维度
              - link "#" [ref=e603] [cursor=pointer]:
                - /url: "#三类分类维度"
            - paragraph [ref=e604]: 智能体可从三个维度进行分类：
            - paragraph [ref=e605]:
              - strong [ref=e606]: 按内部决策架构
              - text: ：简单反射 → 基于模型 → 基于目标 → 基于效用 → 学习型。
            - paragraph [ref=e607]:
              - strong [ref=e608]: 按时间与反应性
              - text: ：反应式（毫秒级响应，无规划，如安全气囊、高频交易系统）；规划式（深思熟虑后行动，如国际象棋 AI、商业计划系统）；混合式（兼顾两者，大多数 LLM Agent 属于此类）。
            - paragraph [ref=e609]:
              - strong [ref=e610]: 按知识表示
              - text: ：符号主义（规则 + 逻辑，可解释性强但脆弱）；亚符号主义（神经网络，表达能力强但黑箱）；神经符号主义（融合两者，LLM Agent 为代表）。
            - heading "运行机制：感知-思考-行动-观察循环#" [level=3] [ref=e611]:
              - text: 运行机制：感知-思考-行动-观察循环
              - link "#" [ref=e612] [cursor=pointer]:
                - /url: "#运行机制感知-思考-行动-观察循环"
            - paragraph [ref=e613]: 智能体的运行遵循一个闭环：
            - generic [ref=e614]:
              - code [ref=e616]:
                - generic [ref=e617]: 感知(Perception) → 思考(Thought) → 行动(Action) → 观察(Observation) → 循环
                - generic [ref=e618]: ├── 规划(Planning)
                - generic [ref=e619]: └── 工具选择(Tool Selection)
              - generic [ref=e620]: plaintext
              - button [ref=e621] [cursor=pointer]:
                - img [ref=e623]
                - text: Copied!
            - paragraph [ref=e625]: 循环中各环节的含义：
            - list [ref=e626]:
              - listitem [ref=e627]:
                - strong [ref=e628]: Thought
                - text: ：内部推理过程的自然语言”快照”，包含对当前状态的分析和下一步计划的推演
              - listitem [ref=e629]:
                - strong [ref=e630]: Action
                - text: ：具体操作，以函数调用形式表示，格式为
                - code [ref=e631]: "{工具名}[{工具输入}]"
              - listitem [ref=e632]:
                - strong [ref=e633]: Observation
                - text: ：环境反馈的自然语言描述，作为下一轮推理的输入
            - heading "普通 LLM 调用与 Agent 的核心差异#" [level=3] [ref=e634]:
              - text: 普通 LLM 调用与 Agent 的核心差异
              - link "#" [ref=e635] [cursor=pointer]:
                - /url: "#普通-llm-调用与-agent-的核心差异"
            - paragraph [ref=e636]: 普通 LLM 调用是单轮问答模式，模型收到问题后直接生成回复，缺乏对目标的持续追踪和对外部世界的干预能力。Agent 则是一个持续的控制循环，具备以下三点本质差异：
            - list [ref=e637]:
              - listitem [ref=e638]:
                - text: Agent 维护明确的
                - strong [ref=e639]: 目标状态
                - text: ，并能在多轮交互中持续追踪目标
              - listitem [ref=e640]:
                - text: Agent 具备
                - strong [ref=e641]: 行动能力
                - text: ，能够通过工具调用影响外部环境并获取反馈
              - listitem [ref=e642]:
                - text: Agent 能够
                - strong [ref=e643]: 动态调整计划
                - text: ，在执行过程中根据中间结果修正后续策略
            - heading "六大核心特征#" [level=3] [ref=e644]:
              - text: 六大核心特征
              - link "#" [ref=e645] [cursor=pointer]:
                - /url: "#六大核心特征"
            - paragraph [ref=e646]: LLM 驱动型 Agent 需具备六个核心能力：
            - list [ref=e647]:
              - listitem [ref=e648]:
                - strong [ref=e649]: 推理（Reasoning）
                - text: ：对问题进行逻辑分析和逐步推导
              - listitem [ref=e650]:
                - strong [ref=e651]: 工具使用（Tool Use）
                - text: ：识别需要调用外部工具的场景并正确调用
              - listitem [ref=e652]:
                - strong [ref=e653]: 记忆（Memory）
                - text: ：维护短期上下文和长期知识
              - listitem [ref=e654]:
                - strong [ref=e655]: 规划（Planning）
                - text: ：将目标分解为可执行的子步骤
              - listitem [ref=e656]:
                - strong [ref=e657]: 自我改进（Self-Improvement）
                - text: ：通过反馈机制优化自身表现
              - listitem [ref=e658]:
                - strong [ref=e659]: 感知（Perception）
                - text: ：从环境中获取信息
            - separator [ref=e660]
            - heading "Agent发展史#" [level=2] [ref=e661]:
              - text: Agent发展史
              - link "#" [ref=e662] [cursor=pointer]:
                - /url: "#agent发展史"
            - heading "符号主义（1950s–1980s）#" [level=3] [ref=e663]:
              - text: 符号主义（1950s–1980s）
              - link "#" [ref=e664] [cursor=pointer]:
                - /url: "#符号主义1950s1980s"
            - paragraph [ref=e665]:
              - text: 核心理论是纽厄尔与西蒙于 1976 年提出的
              - strong [ref=e666]: 物理符号系统假说（PSSH）
              - text: ：智能的本质 = 符号的表示 + 符号的操作。凡是能通过符号表示和符号操作完成功能的系统，就具备产生智能的必要和充分条件。
            - paragraph [ref=e667]:
              - strong [ref=e668]: 代表系统
              - text: ：
            - list [ref=e669]:
              - listitem [ref=e670]:
                - strong [ref=e671]: GPS（通用问题求解器，General Problem Solver）
                - text: ：通过手段-目的分析（Means-Ends Analysis）将当前状态与目标状态之间的差异转化为可执行的行动。在定理证明和逻辑推理任务中表现良好。
              - listitem [ref=e672]:
                - strong [ref=e673]: MYCIN
                - text: ：斯坦福大学开发的医疗诊断专家系统，包含 600 多条由领域专家人工编写的规则，在细菌感染诊断和抗生素推荐方面的准确率超过部分人类医生。
              - listitem [ref=e674]:
                - strong [ref=e675]: SHRDLU
                - text: ：Terry Winograd 开发的积木世界智能体，能够在受限的虚拟环境中理解自然语言指令（如”把那块红色的积木放到绿色的上面”）并执行操作。
            - paragraph [ref=e676]:
              - strong [ref=e677]: 核心局限
              - text: ：
            - list [ref=e678]:
              - listitem [ref=e679]: 知识获取瓶颈：规则需要领域专家和知识工程师逐条编写，效率极低
              - listitem [ref=e680]: 系统脆弱性：遇到规则边界外的输入时表现急剧下降
              - listitem [ref=e681]: 常识缺失：无法处理人类尽在不言中的常识推理
              - listitem [ref=e682]: 框架问题（Frame Problem）：无法有效筛选哪些环境变化与当前目标相关
            - heading "联结主义（1980s–2010s）#" [level=3] [ref=e683]:
              - text: 联结主义（1980s–2010s）
              - link "#" [ref=e684] [cursor=pointer]:
                - /url: "#联结主义1980s2010s"
            - paragraph [ref=e685]: 核心思想是让机器从数据中学习，而非依赖人工编写的规则。关键突破是 1986 年反向传播算法（Backpropagation）的提出，使得多层神经网络的训练成为可能——通过链式法则计算损失函数对每个权重的梯度，从输出层向输入层逐层传播误差信号以更新参数。
            - paragraph [ref=e686]: 代表系统包括 TD-Gammon（使用时序差分学习的强化学习应用，通过自我对弈达到人类专家水平的西洋双陆棋 AI）和 DQN（深度 Q 网络，将深度学习与 Q-Learning 结合，在 Atari 游戏中达到超人类水平）。
            - paragraph [ref=e687]: 联结主义的核心贡献：解决了符号主义面临的知识获取瓶颈（不再需要人工编写规则），通过大规模数据训练自动提取特征和模式。局限在于：模型解释性差、训练需要大量标注数据、容易过拟合。
            - heading "深度学习（2010s–2022）#" [level=3] [ref=e688]:
              - text: 深度学习（2010s–2022）
              - link "#" [ref=e689] [cursor=pointer]:
                - /url: "#深度学习2010s2022"
            - paragraph [ref=e690]: 以 AlexNet（2012 年 ImageNet 比赛冠军，引入 ReLU 激活函数和 Dropout 正则化，标志着深度学习时代的开端）、AlphaGo（2016 年击败围棋世界冠军李世石，结合深度神经网络与蒙特卡洛树搜索）、ResNet（2015 年提出残差连接，解决了深层网络的退化问题，使得训练上百层成为可能）为代表。
            - heading "LLM 驱动时代（2022–至今）#" [level=3] [ref=e691]:
              - text: LLM 驱动时代（2022–至今）
              - link "#" [ref=e692] [cursor=pointer]:
                - /url: "#llm-驱动时代2022至今"
            - paragraph [ref=e693]: 现代 Agent 采用”感知-思考-行动-观察”闭环，以 GPT 系列模型为大脑。关键节点：
            - list [ref=e694]:
              - listitem [ref=e695]: 2022 年：ReAct 论文提出推理与行动交织的范式；Toolformer 论文提出自监督学习方法让模型学会在文本中插入 API 调用标记
              - listitem [ref=e696]: 2023 年：AutoGPT、BabyAGI 展示自主 Agent 的可行性；Generative Agents 论文展示 Agent 模拟社会行为
              - listitem [ref=e697]: 2024–2025 年：MCP 协议标准化工具接入；Agentic-RL 引入强化学习；多 Agent 协作系统落地
            - heading "明斯基的”心智社会”理论#" [level=3] [ref=e698]:
              - text: 明斯基的”心智社会”理论
              - link "#" [ref=e699] [cursor=pointer]:
                - /url: "#明斯基的心智社会理论"
            - paragraph [ref=e700]:
              - text: 马文·明斯基提出智能来自
              - strong [ref=e701]: 多样性协作
              - text: ，而非单一完美的推理原则。他认为人类心智由大量相对简单的”智能体”组成，这些智能体按层次组织并相互协作。这一理论为**多智能体系统（MAS）**奠定了理论基础，也解释了为什么多 Agent 协作架构往往能超越单 Agent 的能力上限。
            - separator [ref=e702]
            - heading "一点点LLM基础#" [level=2] [ref=e703]:
              - text: 一点点LLM基础
              - link "#" [ref=e704] [cursor=pointer]:
                - /url: "#一点点llm基础"
            - heading "语言模型演进#" [level=3] [ref=e705]:
              - text: 语言模型演进
              - link "#" [ref=e706] [cursor=pointer]:
                - /url: "#语言模型演进"
            - paragraph [ref=e707]: N-gram 模型 → 静态词嵌入（Word2Vec、GloVe）→ 循环神经网络（RNN、LSTM）→ Transformer。
            - paragraph [ref=e708]:
              - text: 核心转折点是 Transformer 架构通过
              - strong [ref=e709]: 自注意力机制
              - text: 解决了 RNN 序列处理的两大问题：长距离依赖捕获困难和无法并行计算。
            - heading "Transformer 核心架构#" [level=3] [ref=e710]:
              - text: Transformer 核心架构
              - link "#" [ref=e711] [cursor=pointer]:
                - /url: "#transformer-核心架构"
            - paragraph [ref=e712]:
              - strong [ref=e713]: 自注意力机制（Self-Attention）
              - text: ：
            - paragraph [ref=e714]: 每个输入 token 会生成三个向量：Query（查询）、Key（键）、Value（值）。注意力权重的计算过程为：Q 与所有 K 做点积计算相似度 → Softmax 归一化得到权重 → 与 V 加权求和。由此模型在处理每个 token 时，能够动态关注序列中其他所有 token。
            - paragraph [ref=e715]:
              - strong [ref=e716]: 多头注意力（Multi-Head Attention）
              - text: ：
            - paragraph [ref=e717]: 并行计算多组 Q/K/V 注意力，每组注意力关注不同的语义子空间（语法关系、句法依赖、语义关联等），最后将所有头的输出拼接并线性变换。
            - paragraph [ref=e718]:
              - strong [ref=e719]: 位置编码（Positional Encoding）
              - text: ：
            - paragraph [ref=e720]: 由于自注意力本身不具备序列的位置信息，需要显式注入位置编码。Transformer 原始论文使用固定频率的正弦余弦函数；现代模型多采用可学习位置编码（如 GPT 系列）或旋转位置编码（RoPE，如 LLaMA 系列）。
            - paragraph [ref=e721]:
              - strong [ref=e722]: 前馈网络（FFN）
              - text: ：
            - paragraph [ref=e723]: 每个位置的表示经过两层线性变换（中间层进行特征扩展，输出层降回原维度）和非线性激活函数（如 ReLU、GELU）。FFN 在所有位置间共享参数，在注意力机制提取的上下文表示基础上进行更高层次的抽象。
            - heading "三种架构变体#" [level=3] [ref=e724]:
              - text: 三种架构变体
              - link "#" [ref=e725] [cursor=pointer]:
                - /url: "#三种架构变体"
            - list [ref=e726]:
              - listitem [ref=e727]:
                - strong [ref=e728]: Encoder-Only（BERT）
                - text: ：双向注意力，适合文本分类、序列标注、语义匹配等理解类任务。训练目标通常为掩码语言建模（MLM）。
              - listitem [ref=e729]:
                - strong [ref=e730]: Decoder-Only（GPT 系列）
                - text: ：因果注意力（Causal Attention，每个 token 只能关注自身及之前的 token），适合文本生成类任务。这是当前大语言模型的主流架构选择。
              - listitem [ref=e731]:
                - strong [ref=e732]: Encoder-Decoder（T5）
                - text: ：编码器做双向理解 + 解码器做自回归生成，适合序列到序列的转换任务（翻译、摘要）。
            - heading "分词（Tokenization）#" [level=3] [ref=e733]:
              - text: 分词（Tokenization）
              - link "#" [ref=e734] [cursor=pointer]:
                - /url: "#分词tokenization"
            - paragraph [ref=e735]: 主流分词算法：
            - list [ref=e736]:
              - listitem [ref=e737]:
                - strong [ref=e738]: BPE（Byte Pair Encoding）
                - text: ：GPT 系列使用。从字符级开始，迭代合并最高频的相邻 token 对。不需要特殊标记或词表预定义，自动学习子词切分。
              - listitem [ref=e739]:
                - strong [ref=e740]: WordPiece
                - text: ：BERT 使用。与 BPE 类似，但合并标准为互信息最大化（选择能最大程度提升数据似然的 pair），而非单纯的高频合并。
              - listitem [ref=e741]:
                - strong [ref=e742]: SentencePiece
                - text: ：T5、LLaMA 使用。将原始文本直接视为 Unicode 字符序列，不依赖空格分割，天然支持多语言。原始模型训练中使用的是 BPE 的变体（Unigram LM）。
              - listitem [ref=e743]:
                - strong [ref=e744]: Tiktoken
                - text: ：OpenAI 开发的高性能分词库，使用 BPE 算法，针对 GPT 系列模型优化，分词速度比 HuggingFace tokenizer 快数倍。
            - paragraph [ref=e745]: 分词的粒度直接影响模型的有效上下文长度和跨语言能力。
            - heading "采样参数#" [level=3] [ref=e746]:
              - text: 采样参数
              - link "#" [ref=e747] [cursor=pointer]:
                - /url: "#采样参数"
            - paragraph [ref=e748]: 控制 LLM 输出随机性的三个核心参数：
            - list [ref=e749]:
              - listitem [ref=e750]:
                - paragraph [ref=e751]:
                  - strong [ref=e752]: Temperature
                  - text: ：控制概率分布的”尖锐”程度。值趋近于 0 时，最高概率 token 几乎被确定选中，输出确定性强但缺乏多样性。值较高时概率分布更平坦，低概率 token 也有机会被选中，输出更多样。通常在 0.7–0.9 用于创意任务，0.1–0.3 用于精确推理任务。
              - listitem [ref=e753]:
                - paragraph [ref=e754]:
                  - strong [ref=e755]: Top-k
                  - text: ：解码时仅从概率最高的 k 个 token 中采样，将其余 token 的概率置为零后再归一化。避免了概率分布的”长尾”被小概率 token 污染。
              - listitem [ref=e756]:
                - paragraph [ref=e757]:
                  - strong [ref=e758]: Top-p（核采样）
                  - text: ：设置累积概率阈值 p（如 0.9），仅保留使得累积概率首次超过 p 的最小 token 集合。与 Top-k 的固定数量不同，Top-p 根据当前概率分布动态调整候选集大小。
            - paragraph [ref=e759]: 实际应用中常将 Top-k 和 Top-p 组合使用：先保留 Top-k 个 token，再从其中应用 Top-p 过滤。
            - heading "上下文学习（In-Context Learning）机制#" [level=3] [ref=e760]:
              - text: 上下文学习（In-Context Learning）机制
              - link "#" [ref=e761] [cursor=pointer]:
                - /url: "#上下文学习in-context-learning机制"
            - paragraph [ref=e762]: ICL 是 LLM 最关键的涌现能力之一：仅通过 prompt 中放置的输入-输出示例，模型就能推断出任务模式并正确泛化，整个过程不涉及任何参数更新。
            - paragraph [ref=e763]:
              - strong [ref=e764]: 与微调的本质区别
              - text: ：SFT 通过梯度更新改变模型参数，是一种”学习”；ICL 不修改模型参数，仅利用模型在预训练阶段已经习得的模式匹配能力。ICL 的效果依赖模型规模——小模型（<1B 参数）几乎不具备 ICL 能力，随着模型规模增大 ICL 能力涌现。
            - paragraph [ref=e765]:
              - strong [ref=e766]: ICL 的工作机制解释
              - text: ：一种主流假说是”任务归纳”——prompt 中的示例序列激活了模型预训练阶段见过的类似模式，模型通过注意力机制定位这些模式并延续到最终输出。示例在 prompt 中扮演了”任务格式指示器”的角色，而非”新知识注入”。
            - paragraph [ref=e767]:
              - strong [ref=e768]: 在 Agent 中的使用方式
              - text: ：ICL 在 Agent 系统中用于两种场景——
              - strong [ref=e769]: 系统级静态示例
              - text: （在系统提示词中放置固定数量、固定格式的工具调用示例，确保 Agent 始终按标准格式输出）和
              - strong [ref=e770]: 运行时动态示例
              - text: （根据当前上下文动态选择最相关的示例加入 prompt，通常在 RAG 场景中使用）。
            - heading "提示工程（Prompt Engineering）#" [level=3] [ref=e771]:
              - text: 提示工程（Prompt Engineering）
              - link "#" [ref=e772] [cursor=pointer]:
                - /url: "#提示工程prompt-engineering"
            - paragraph [ref=e773]:
              - strong [ref=e774]: 零样本提示（Zero-shot）
              - text: ：直接给出任务描述，模型凭借训练阶段学习的泛化能力执行。适用于大模型（>100B 参数）已具备足够能力的常见任务。
            - paragraph [ref=e775]:
              - strong [ref=e776]: 少样本提示（Few-shot）
              - text: ：在 prompt 中给出若干输入-输出示例，模型通过上下文学习（In-Context Learning）推断任务模式。示例数量通常在 3–10 个，过多示例可能超出上下文窗口限制。
            - paragraph [ref=e777]:
              - strong [ref=e778]: 思维链（Chain-of-Thought, CoT）
              - text: ：在 prompt 中加入中间推理步骤的示例，引导模型在输出最终答案前先生成逐步推理过程。显著提升需要多步逻辑推导的任务（数学题、逻辑推理、常识推理）的准确率。可分为人工编写 CoT 示例和零样本 CoT（仅添加”Let’s think step by step”等触发词）。
            - paragraph [ref=e779]:
              - strong [ref=e780]: 思维树（Tree of Thoughts, ToT）
              - text: ：将推理过程扩展为树状搜索结构。每个节点表示一种推理状态或中间结论，从根节点出发探索多条推理路径，通过 LLM 自身对每条路径进行评估打分，采用广度优先搜索（BFS）或深度优先搜索（DFS）选择最优路径。适合需要探索多种可能性、存在多条可行解题路径的复杂问题。
            - paragraph [ref=e781]:
              - strong [ref=e782]: 自洽性（Self-Consistency）
              - text: ：对同一问题多次采样（使用略高的 Temperature），然后通过多数投票或加权投票选择出现频率最高的答案。利用了 LLM 每次生成结果的随机性——虽然单次可能出错，但多次采样的共识倾向于正确。
            - heading "训练范式#" [level=3] [ref=e783]:
              - text: 训练范式
              - link "#" [ref=e784] [cursor=pointer]:
                - /url: "#训练范式"
            - paragraph [ref=e785]: LLM 的训练分为三个阶段：
            - list [ref=e786]:
              - listitem [ref=e787]:
                - paragraph [ref=e788]:
                  - strong [ref=e789]: 预训练（Pre-training）
                  - text: ：在海量无标注文本（通常数 TB）上训练下一个 token 预测任务。此阶段模型关注文本中 token 的共现和序列模式，学到语言知识、世界知识和推理能力的基础。所需计算资源巨大（数千 GPU 小时）。
              - listitem [ref=e790]:
                - paragraph [ref=e791]:
                  - strong [ref=e792]: 指令微调（Instruction Fine-tuning, SFT）
                  - text: ：在人工标注或合成生成的指令-回复数据上继续训练。数据格式为
                  - code [ref=e793]: "{指令, 输入, 期望输出}"
                  - text: 三元组。具体示例：
            - generic [ref=e794]:
              - code [ref=e796]:
                - generic [ref=e797]: "{"
                - generic [ref=e798]: "\"instruction\": \"计算 25 和 37 的和\","
                - generic [ref=e799]: "\"input\": \"\","
                - generic [ref=e800]: "\"output\": \"25 + 37 = 62\""
                - generic [ref=e801]: "}"
                - generic [ref=e802]: "{"
                - generic [ref=e803]: "\"instruction\": \"写一个 Python 函数计算斐波那契数列\","
                - generic [ref=e804]: "\"input\": \"n = 10\","
                - generic [ref=e805]: "\"output\": \"def fibonacci(n):\\n if n <= 1:\\n return n\\n return fibonacci(n-1) + fibonacci(n-2)\\n\\nprint(fibonacci(10))\""
                - generic [ref=e806]: "}"
              - generic [ref=e807]: plaintext
              - button [ref=e808] [cursor=pointer]:
                - img [ref=e810]
                - text: Copied!
            - paragraph [ref=e812]: 此阶段教会模型遵循指令和格式化回复，使其从”能补全文本”变为”能回答问题”。
            - list [ref=e813]:
              - listitem [ref=e814]:
                - strong [ref=e815]: 人类反馈强化学习（RLHF）
                - text: ：分为三个子步骤——收集人类偏好数据（对同一 prompt 的多个模型输出排序）→ 训练奖励模型（Reward Model，学会预测人类偏好）→ 用 PPO 算法优化策略模型（使模型输出最大化奖励模型评分）。RLHF 使模型输出在语言质量、事实性、安全性上更符合人类期望。
            - paragraph [ref=e816]: LoRA（Low-Rank Adaptation）是一种参数高效的微调方法。对于预训练权重矩阵 W，LoRA 将其更新量 ΔW 分解为两个低秩矩阵 A 和 B 的乘积（ΔW = B·A），训练时只更新 A 和 B 的参数，冻结原始权重。训练完成后将低秩矩阵合并回原权重，推理时无额外延迟。以 Qwen3-0.6B 为例，使用 LoRA 微调仅需约 4GB 显存。
            - heading "Scaling Laws 与涌现能力#" [level=3] [ref=e817]:
              - text: Scaling Laws 与涌现能力
              - link "#" [ref=e818] [cursor=pointer]:
                - /url: "#scaling-laws-与涌现能力"
            - paragraph [ref=e819]: Scaling Laws（缩放法则）揭示了模型性能与三个因素之间的幂律关系：模型参数量（N）、训练数据量（D）、计算资源量（C）。当三者在对数尺度上等比例增加时，模型性能按幂律持续提升，没有明显的收益递减拐点。
            - paragraph [ref=e820]: 当模型规模跨越某个阈值时，会涌现出小模型不具备的能力：
            - list [ref=e821]:
              - listitem [ref=e822]:
                - strong [ref=e823]: 上下文学习（In-Context Learning）
                - text: ：仅通过 prompt 中的示例就能理解任务，无需梯度更新
              - listitem [ref=e824]:
                - strong [ref=e825]: 思维链推理
                - text: ：能够执行多步逻辑推理
              - listitem [ref=e826]:
                - strong [ref=e827]: 指令遵循
                - text: ：理解并以自然语言描述的执行指令
              - listitem [ref=e828]:
                - strong [ref=e829]: 工具调用
                - text: ：识别需要外部工具的场景并生成结构化参数
            - heading "幻觉问题#" [level=3] [ref=e830]:
              - text: 幻觉问题
              - link "#" [ref=e831] [cursor=pointer]:
                - /url: "#幻觉问题"
            - paragraph [ref=e832]: 幻觉指模型生成与事实不符的内容。分为三类：
            - list [ref=e833]:
              - listitem [ref=e834]:
                - strong [ref=e835]: 事实性幻觉
                - text: ：生成与已知事实矛盾的内容（如将”北京是中国的首都”写成”上海是中国的首都”）
              - listitem [ref=e836]:
                - strong [ref=e837]: 忠实性幻觉
                - text: ：生成与用户指令或对话历史不一致的内容（如用户说”我叫张三”，模型回复”李四你好”）
              - listitem [ref=e838]:
                - strong [ref=e839]: 内在幻觉
                - text: ：生成与模型自身训练数据中的知识相矛盾的内容
            - paragraph [ref=e840]: 缓解方案：RAG（检索相关文档作为生成依据）、外部工具验证（调用搜索引擎或数据库核实事实）、多模型投票（多个模型独立判断事实性）、幻觉检测提示（在 prompt 中加入”如果你的回答中包含不确信的信息，请标注出来”）。
            - heading "Toolformer：让模型学会调用工具#" [level=3] [ref=e841]:
              - text: Toolformer：让模型学会调用工具
              - link "#" [ref=e842] [cursor=pointer]:
                - /url: "#toolformer让模型学会调用工具"
            - paragraph [ref=e843]: Toolformer 是 Meta AI 于 2023 年提出的方法，核心思想是不修改模型架构，而是通过自监督学习方式让语言模型学会在适当的时机调用外部工具（计算器、搜索引擎、翻译系统等）。
            - paragraph [ref=e844]:
              - strong [ref=e845]: API 调用表示
              - text: ：在文本序列中使用特殊 token 标记 API 调用的开始和结束：
              - code [ref=e846]: <API> a_c(i_c) </API>
              - text: （无结果状态）和
              - code [ref=e847]: <API> a_c(i_c) → r </API>
              - text: （有结果状态）。通过这种设计，API 调用可以无缝地插入到文本生成过程中。
            - paragraph [ref=e848]:
              - strong [ref=e849]: 训练数据构建
              - text: 采用”采样-执行-过滤”三阶段：
            - list [ref=e850]:
              - listitem [ref=e851]:
                - strong [ref=e852]: 采样阶段
                - text: ：使用少量人工编写的少样本示例引导模型在文本中找到可能需要的工具调用位置，对每个位置生成
                - code [ref=e853]: <API>
                - text: token 的概率，保留概率高于阈值的位置
              - listitem [ref=e854]:
                - strong [ref=e855]: 执行阶段
                - text: ：实际调用对应的 API，获取真实的返回结果
              - listitem [ref=e856]:
                - strong [ref=e857]: 过滤阶段
                - text: ：比较使用 API 调用和不使用 API 调用两种情况下的加权交叉熵损失。仅当 API 调用能显著降低损失时才保留该样本
            - paragraph [ref=e858]:
              - strong [ref=e859]: 推理过程
              - text: ：模型正常解码。当输出
              - code [ref=e860]: →
              - text: token 时系统暂停执行 API 调用，将结果插入文本后继续解码。
            - paragraph [ref=e861]:
              - strong [ref=e862]: 实验效果
              - text: ：Toolformer（6.7B 参数）在零样本任务上超越了 GPT-3（175B 参数），且微调后未牺牲语言模型的原生能力——事实完成任务准确率从 39.8% 提升至 53.5%，数学任务准确率从 14.0% 提升至 40.4%。
            - paragraph [ref=e863]:
              - strong [ref=e864]: 局限
              - text: ：仅支持单次非迭代调用（无法形成工具链）、无成本感知（不考虑 API 延迟和费用）、API 集合固定（扩展新工具需重新训练）、对提示词敏感。
            - heading "模型选型#" [level=3] [ref=e865]:
              - text: 模型选型
              - link "#" [ref=e866] [cursor=pointer]:
                - /url: "#模型选型"
            - paragraph [ref=e867]: 闭源模型：GPT-4o（OpenAI，综合能力强、生态好）、Claude 3.5（Anthropic，长上下文和安全性突出）、Gemini 1.5（Google，多模态能力强）、文心一言、通义千问。
            - paragraph [ref=e868]: 开源模型：LLaMA 3.1（Meta，社区生态最丰富）、Qwen2.5（阿里巴巴，中文能力和工具调用表现出色）、Mistral（Mistral AI，高效推理）、DeepSeek（深度求索，推理能力强）、ChatGLM3（智谱 AI，中文优化好）。
            - paragraph [ref=e869]: 本地部署实践包括：量化加载（4-bit / 8-bit 降低显存需求）、GGUF 格式转换、对话交互、流式输出和性能优化。
            - separator [ref=e870]
            - heading "Agent经典范式#" [level=2] [ref=e871]:
              - text: Agent经典范式
              - link "#" [ref=e872] [cursor=pointer]:
                - /url: "#agent经典范式"
            - heading "ReAct#" [level=3] [ref=e873]:
              - text: ReAct
              - link "#" [ref=e874] [cursor=pointer]:
                - /url: "#react"
            - paragraph [ref=e875]: ReAct（Reasoning + Acting）由 Shunyu Yao 于 2022 年提出，是目前最广泛使用的 Agent 范式。其核心思想是将推理（Reasoning）与行动（Acting）紧密结合，形成**思考（Thought）→ 行动（Action）→ 观察（Observation）**的闭环。
            - heading "循环结构#" [level=4] [ref=e876]:
              - text: 循环结构
              - link "#" [ref=e877] [cursor=pointer]:
                - /url: "#循环结构"
            - paragraph [ref=e878]: 整个执行过程是一个 while 循环，每次迭代包含六个步骤：
            - list [ref=e879]:
              - listitem [ref=e880]:
                - strong [ref=e881]: 格式化 Prompt
                - text: ：将系统指令、可用工具描述、当前问题、历史交互记录组装成当前轮次的 prompt
              - listitem [ref=e882]:
                - strong [ref=e883]: 调用 LLM
                - text: ：将 prompt 发送给 LLM 获取回复
              - listitem [ref=e884]:
                - strong [ref=e885]: 解析输出
                - text: ：从 LLM 回复中提取 Thought 和 Action 字段
              - listitem [ref=e886]:
                - strong [ref=e887]: 判断终止条件
                - text: ：如果 Action 为
                - code [ref=e888]: Finish[最终答案]
                - text: ，则输出结果并结束循环
