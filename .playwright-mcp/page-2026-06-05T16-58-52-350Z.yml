            - paragraph [ref=e1078]:
              - text: Producer（生成者）和 Critic（评审者）使用
              - strong [ref=e1079]: 不同的系统提示词
              - text: ，职责分离避免了”自己写自己审”的认知偏见。实际实现中可以使用不同的模型（如生成用快速模型、反思用更强模型）。
            - heading "停止条件#" [level=4] [ref=e1080]:
              - text: 停止条件
              - link "#" [ref=e1081] [cursor=pointer]:
                - /url: "#停止条件"
            - paragraph [ref=e1082]: 反思循环的停止条件包括：Critic 认为输出已达标（返回”无需改进”信号）；达到最大迭代次数（通常 2–3 轮）；改进幅度小于设定阈值。
            - heading "适用的自我检查维度#" [level=4] [ref=e1083]:
              - text: 适用的自我检查维度
              - link "#" [ref=e1084] [cursor=pointer]:
                - /url: "#适用的自我检查维度"
            - table [ref=e1086]:
              - rowgroup [ref=e1087]:
                - row "检查类型 检查内容" [ref=e1088]:
                  - columnheader "检查类型" [ref=e1089]
                  - columnheader "检查内容" [ref=e1090]
              - rowgroup [ref=e1091]:
                - row "结构自检 输出格式是否完整？是否包含所有必须字段？" [ref=e1092]:
                  - cell "结构自检" [ref=e1093]
                  - cell "输出格式是否完整？是否包含所有必须字段？" [ref=e1094]
                - row "事实自检 是否包含不可验证的事实？是否可能误导用户？" [ref=e1095]:
                  - cell "事实自检" [ref=e1096]
                  - cell "是否包含不可验证的事实？是否可能误导用户？" [ref=e1097]
                - row "工具行为自检 工具调用是否成功？错误信息是否为空？" [ref=e1098]:
                  - cell "工具行为自检" [ref=e1099]
                  - cell "工具调用是否成功？错误信息是否为空？" [ref=e1100]
                - row "推理逻辑自检 是否存在逻辑跳跃？关键步骤缺失？未说明的假设？" [ref=e1101]:
                  - cell "推理逻辑自检" [ref=e1102]
                  - cell "是否存在逻辑跳跃？关键步骤缺失？未说明的假设？" [ref=e1103]
            - paragraph [ref=e1104]: Reflection 的核心价值：在没有外部反馈时，让 Agent 利用模型自身对”正确”和”错误”的判断能力进行自我修正。在代码生成（检查语法错误和逻辑 bug）、数学推理（检查计算过程）等输出可以自我验证的任务中效果显著。
            - heading "Tree of Thoughts（ToT）#" [level=3] [ref=e1105]:
              - text: Tree of Thoughts（ToT）
              - link "#" [ref=e1106] [cursor=pointer]:
                - /url: "#tree-of-thoughtstot"
            - paragraph [ref=e1107]: ToT 将推理过程建模为树状搜索结构，每个节点表示一种推理状态（一段思考或中间结论），从根节点（原始问题）出发探索多条可能的推理路径。
            - paragraph [ref=e1108]:
              - strong [ref=e1109]: 评估与搜索
              - text: ：每个中间节点由 LLM 自身进行评估打分（“这条推理路径是否可行”），然后根据搜索策略决定下一步探索哪些路径。这种方法结合了传统搜索算法与 LLM 的语义评估能力。
            - paragraph [ref=e1110]:
              - strong [ref=e1111]: 两种搜索策略
              - text: ：广度优先搜索（BFS）按层级逐层扩展，每层保留评分最高的 k 个节点，适合分支较浅但宽度大的问题。深度优先搜索（DFS）沿一条路径深入直到达到叶节点（最终答案或死路），然后回溯到上一个分支点继续探索，适合分支较深但宽度窄的问题。
            - paragraph [ref=e1112]:
              - strong [ref=e1113]: 适用场景
              - text: ：需要探索多种可能性、中间结果可以独立评估的任务，如填字游戏、创意写作、数学证明路径选择。以一个填字游戏为例：每个空格节点可以填入多个候选词，LLM 评估每个候选词的合理性和与已有答案的匹配度，BFS 保留最优的几条候选路径继续探索。
            - paragraph [ref=e1114]: ToT 的代价：每次推理需要多次 LLM 调用（每个节点都需要评估），计算成本显著高于 CoT。因此只在问题复杂度高到简单 CoT 无法解决时才值得使用。
            - separator [ref=e1115]
            - heading "Agent 开发框架#" [level=2] [ref=e1116]:
              - text: Agent 开发框架
              - link "#" [ref=e1117] [cursor=pointer]:
                - /url: "#agent-开发框架"
            - heading "AutoGen（微软）#" [level=3] [ref=e1118]:
              - text: AutoGen（微软）
              - link "#" [ref=e1119] [cursor=pointer]:
                - /url: "#autogen微软"
            - paragraph [ref=e1120]:
              - text: 基于多 Agent 对话的协作框架，采用
              - strong [ref=e1121]: 对话与消息驱动
              - text: 的协作方式。Agent 之间的核心交互是消息传递——一个 Agent 发送消息，其他 Agent 接收并回复，消息在 Agent 之间流转驱动任务推进。
            - paragraph [ref=e1122]:
              - strong [ref=e1123]: 核心组件
              - text: ：
            - list [ref=e1124]:
              - listitem [ref=e1125]:
                - code [ref=e1126]: AssistantAgent
                - text: ：封装 LLM 的助手 Agent，负责生成回复、规划任务
              - listitem [ref=e1127]:
                - code [ref=e1128]: UserProxyAgent
                - text: ：代表人类用户的代理 Agent，可以执行代码、调用工具，并将执行结果反馈回对话
              - listitem [ref=e1129]:
                - code [ref=e1130]: RoundRobinGroupChat
                - text: ：轮询群聊机制，按固定顺序依次让每个 Agent 发言
              - listitem [ref=e1131]:
                - code [ref=e1132]: TextMentionTermination("TERMINATE")
                - text: ：当对话中出现 TERMINATE 关键词时自动结束
            - paragraph [ref=e1133]:
              - strong [ref=e1134]: 实战案例
              - text: ：用 Streamlit 构建比特币价格 Web 应用。角色链为产品经理（定义需求）→ 工程师（编写 Streamlit 代码）→ 代码审查员（审查代码质量）→ 用户代理（实际执行代码并验证结果）。每个 Agent 专注于自己的角色职责，通过群聊对话迭代完善。
            - heading "AgentScope#" [level=3] [ref=e1135]:
              - text: AgentScope
              - link "#" [ref=e1136] [cursor=pointer]:
                - /url: "#agentscope"
            - paragraph [ref=e1137]: 消息驱动的多智能体平台，强调工程化优先的设计哲学：组合式架构 + 消息驱动，适合生产级多 Agent 系统构建。
            - paragraph [ref=e1138]:
              - strong [ref=e1139]: 核心组件
              - text: ：
            - list [ref=e1140]:
              - listitem [ref=e1141]:
                - code [ref=e1142]: Msg
                - text: ：统一消息格式，所有 Agent 间通信都封装为标准化的消息对象
              - listitem [ref=e1143]:
                - code [ref=e1144]: MsgHub
                - text: ：消息路由中心，支持消息广播、组播、私密频道
              - listitem [ref=e1145]:
                - code [ref=e1146]: AgentBase
                - text: ：Agent 基类，核心方法为
                - code [ref=e1147]: reply()
                - text: ，子类通过重写该方法定义自己的响应逻辑
            - paragraph [ref=e1148]:
              - strong [ref=e1149]: 实战案例
              - text: ：三国狼人杀游戏。狼人夜通过 MsgHub 建立私密频道（仅狼人 Agent 能通信）；使用 Pydantic 结构化输出约束 Agent 行为（确保每个 Agent 在投票、发言时输出格式稳定）；设计了容错机制（单个 Agent 异常不中断整个游戏流程，由 MsgHub 管理异常 Agent 的消息分发）。
            - heading "CAMEL#" [level=3] [ref=e1150]:
              - text: CAMEL
              - link "#" [ref=e1151] [cursor=pointer]:
                - /url: "#camel"
            - paragraph [ref=e1152]: 设计哲学为”轻架构、重提示”——通过巧妙地设计 prompt（角色分工 + Inception Prompting），让简单的双 Agent 结构完成复杂任务，无需复杂的工程框架。
            - paragraph [ref=e1153]:
              - strong [ref=e1154]: 核心模式
              - text: ：
            - list [ref=e1155]:
              - listitem [ref=e1156]:
                - strong [ref=e1157]: AI User
                - text: ：提需求的角色，向 AI Assistant 下达任务指令
              - listitem [ref=e1158]:
                - strong [ref=e1159]: AI Assistant
                - text: ：执行产出的角色，完成任务并返回结果
              - listitem [ref=e1160]:
                - strong [ref=e1161]: Inception Prompting
                - text: ：在 prompt 中为每个角色注入详细的角色设定（你是谁、你有什么技能、你如何协作），让 Agent 在角色框架内自主协商任务分工
            - paragraph [ref=e1162]:
              - strong [ref=e1163]: 终止标志
              - text: ：
              - code [ref=e1164]: <CAMEL_TASK_DONE>
              - text: ，当 AI Assistant 认为任务完成时输出该标记。
            - paragraph [ref=e1165]:
              - strong [ref=e1166]: 实战案例
              - text: ：“心理学家”与”作家”双角色协作创作拖延症科普电子书。AI User（角色：心理学家）定义每章主题和核心论点，AI Assistant（角色：科普作家）撰写章节内容，通过多轮对话逐步完成全书。
            - heading "LangGraph#" [level=3] [ref=e1167]:
              - text: LangGraph
              - link "#" [ref=e1168] [cursor=pointer]:
                - /url: "#langgraph"
            - paragraph [ref=e1169]: 将 Agent 执行流建模为有向图 / 状态机。天然支持循环（ReAct 的 thought-action-observation 循环）、条件分支（根据评估结果走不同路径）、回退（失败后回退到上一步）和 Reflection（自环实现自我评估和改进）。
            - paragraph [ref=e1170]:
              - strong [ref=e1171]: 三要素
              - text: ：
            - list [ref=e1172]:
              - listitem [ref=e1173]:
                - strong [ref=e1174]: State（状态）
                - text: ：使用
                - code [ref=e1175]: TypedDict
                - text: 定义共享状态，所有 Node 共享并读写
              - listitem [ref=e1176]:
                - strong [ref=e1177]: Node（节点）
                - text: ：函数，接收当前 State，返回 State 的部分更新
              - listitem [ref=e1178]:
                - strong [ref=e1179]: Edge（边）
                - text: ：普通边（固定路径）和条件边（根据 State 的内容动态决定下一步）
            - paragraph [ref=e1180]:
              - strong [ref=e1181]: 实战案例
              - text: ：三步问答助手。
              - code [ref=e1182]: Understand
              - text: （理解问题意图）→
              - code [ref=e1183]: Search
              - text: （调用 Tavily 搜索引擎检索信息）→
              - code [ref=e1184]: Answer
              - text: （整合信息生成回答）。任意一步失败则沿条件边回退到前一步（如 Search 失败就回到 Understand 阶段重新理解问题）。
            - heading "涌现式协作 vs 显式控制#" [level=3] [ref=e1185]:
              - text: 涌现式协作 vs 显式控制
              - link "#" [ref=e1186] [cursor=pointer]:
                - /url: "#涌现式协作-vs-显式控制"
            - table [ref=e1188]:
              - rowgroup [ref=e1189]:
                - row "维度 涌现式（AutoGen / CAMEL） 显式控制（LangGraph）" [ref=e1190]:
                  - columnheader "维度" [ref=e1191]
                  - columnheader "涌现式（AutoGen / CAMEL）" [ref=e1192]
                  - columnheader "显式控制（LangGraph）" [ref=e1193]
              - rowgroup [ref=e1194]:
                - row "控制权 去中心化，Agent 自主协商 中心化，开发者预定义流程" [ref=e1195]:
                  - cell "控制权" [ref=e1196]
                  - cell "去中心化，Agent 自主协商" [ref=e1197]
                  - cell "中心化，开发者预定义流程" [ref=e1198]
