            - heading "优缺点#" [level=4] [ref=e992]:
              - text: 优缺点
              - link "#" [ref=e993] [cursor=pointer]:
                - /url: "#优缺点"
            - paragraph [ref=e994]: 优势：高可解释性（Thought 链可完整追溯决策过程）、动态规划（每步可根据上一步的结果调整策略）、工具协同（LLM 负责规划，工具负责执行）。
            - paragraph [ref=e995]: 缺陷：强依赖模型能力（LLM 推理弱则效果差）、执行效率低（串行循环需要多次 LLM 调用）、Prompt 脆弱（格式或标点变化可能导致解析失败）、可能陷入局部最优或推理死循环。
            - heading "Plan-and-Solve#" [level=3] [ref=e996]:
              - text: Plan-and-Solve
              - link "#" [ref=e997] [cursor=pointer]:
                - /url: "#plan-and-solve"
            - paragraph [ref=e998]:
              - text: Plan-and-Solve 在 ReAct 的基础上增加了明确的
              - strong [ref=e999]: 全局规划
              - text: 阶段。Agent 首先制定一个完整的执行计划，再逐步执行，执行过程中可根据实际情况调整计划。
            - paragraph [ref=e1000]:
              - strong [ref=e1001]: 架构
              - text: ：由两个组件协作完成——规划器（Planner）将复杂任务拆解为一系列逻辑清晰的子步骤（输出为结构化的步骤列表），执行器（Executor）严格按照步骤逐一落实，每一步将原始问题、完整计划、历史结果作为上下文传给模型。
            - paragraph [ref=e1002]:
              - strong [ref=e1003]: 核心 Prompt 模板
              - text: ：
            - generic [ref=e1004]:
              - code [ref=e1006]:
                - generic [ref=e1007]: 你是一个"先规划后执行"的智能体。
                - generic [ref=e1008]: 可用工具如下：
                - generic [ref=e1009]: "{tools}"
                - generic [ref=e1011]: 请先分析问题，生成一个完整的执行计划（步骤列表），然后严格按照计划执行。
                - generic [ref=e1013]: "问题：{question}"
                - generic [ref=e1015]: 请先输出计划（Plan），然后按步骤执行（Execute）。
              - generic [ref=e1016]: plaintext
              - button [ref=e1017] [cursor=pointer]:
                - img [ref=e1019]
                - text: Copied!
            - paragraph [ref=e1021]: 实际实现中，规划器和执行器的 Prompt 是分开设计的：规划器 Prompt 要求模型输出结构化的步骤列表；执行器 Prompt 传入原始问题 + 完整计划 + 已执行步骤的结果，要求模型按计划继续执行。
            - paragraph [ref=e1022]: 与 ReAct 的区别：ReAct 适合”边走边看”的探索性任务，每一步的推理依托上一步的观察结果。Plan-and-Solve 适合逻辑路径相对明确的多步任务，如编写一段代码（先规划文件结构再逐个实现）。前者灵活但可能缺乏方向，后者稳定但缺乏灵活性。
            - heading "Reflection（自我反思）#" [level=3] [ref=e1023]:
              - text: Reflection（自我反思）
              - link "#" [ref=e1024] [cursor=pointer]:
                - /url: "#reflection自我反思"
            - paragraph [ref=e1025]: "Reflection 范式赋予 Agent 评估自身输出并修正的能力。论文《Self-refine: Iterative refinement with self-feedback》证明：在所有任务、所有测试模型（GPT-3.5、GPT-4、Claude）上，反思模式全面碾压直接生成。"
