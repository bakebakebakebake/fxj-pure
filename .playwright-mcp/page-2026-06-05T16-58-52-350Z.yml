            - heading "性能评估#" [level=2] [ref=e1889]:
              - text: 性能评估
              - link "#" [ref=e1890] [cursor=pointer]:
                - /url: "#性能评估"
            - heading "评估目标#" [level=3] [ref=e1891]:
              - text: 评估目标
              - link "#" [ref=e1892] [cursor=pointer]:
                - /url: "#评估目标"
            - paragraph [ref=e1893]: 智能体评估的四个目标：
            - list [ref=e1894]:
              - listitem [ref=e1895]:
                - strong [ref=e1896]: 量化性能
                - text: ：知道系统当前达到了什么水平，是”完全可以用”还是”仅能用于 demo”
              - listitem [ref=e1897]:
                - strong [ref=e1898]: 对比方案
                - text: ：在不同 Agent 方案、不同模型、不同 prompt 版本之间做出客观选择
              - listitem [ref=e1899]:
                - strong [ref=e1900]: 发现弱点
                - text: ：定位系统瓶颈和改进方向——是工具调用选择不正确？记忆检索不准？还是推理能力不足？
              - listitem [ref=e1901]:
                - strong [ref=e1902]: 证明可靠性
                - text: ：在发布到生产环境之前，确保系统在各类场景下行为正确
            - heading "BFCL（Berkeley Function Calling Leaderboard）#" [level=3] [ref=e1903]:
              - text: BFCL（Berkeley Function Calling Leaderboard）
              - link "#" [ref=e1904] [cursor=pointer]:
                - /url: "#bfclberkeley-function-calling-leaderboard"
            - paragraph [ref=e1905]:
              - text: 伯克利大学提出的评估智能体工具调用能力的基准。使用
              - strong [ref=e1906]: AST 匹配算法
              - text: 评估函数调用是否与期望调用完全一致（包括函数名、参数名、参数值类型、嵌套结构）。
            - paragraph [ref=e1907]:
              - strong [ref=e1908]: 四个评估类别
              - text: ：
            - list [ref=e1909]:
              - listitem [ref=e1910]:
                - strong [ref=e1911]: Simple
                - text: ：单个函数调用，参数直接匹配
              - listitem [ref=e1912]:
                - strong [ref=e1913]: Multiple
                - text: ：需要依次调用多个独立函数，每个调用的输出可能是下一个的输入
              - listitem [ref=e1914]:
                - strong [ref=e1915]: Parallel
                - text: ：多个函数调用之间没有依赖关系，可以并行执行，需要模型在一次回复中同时产生多个工具调用
              - listitem [ref=e1916]:
                - strong [ref=e1917]: Irrelevance
                - text: ：测试模型判断”何时不需要调用工具”的能力——某些问题不需要调用任何工具即可回答，模型如果过度调用工具会被扣分
            - paragraph [ref=e1918]:
              - strong [ref=e1919]: 三种使用方式
              - text: ：
            - list [ref=e1920]:
              - listitem [ref=e1921]:
                - strong [ref=e1922]: BFCLEvaluationTool
                - text: （推荐）：一行代码完成评估
              - listitem [ref=e1923]:
                - strong [ref=e1924]: 一键评估脚本
                - text: ：
                - code [ref=e1925]: 04_run_bfcl_evaluation.py --category simple --samples 10
              - listitem [ref=e1926]:
                - strong [ref=e1927]: 直接使用 Dataset + Evaluator
                - text: ：自定义评估流程，适用于需要修改评估逻辑的场景
            - heading "GAIA（General AI Assistants）#" [level=3] [ref=e1928]:
              - text: GAIA（General AI Assistants）
              - link "#" [ref=e1929] [cursor=pointer]:
                - /url: "#gaiageneral-ai-assistants"
            - paragraph [ref=e1930]: 通用 AI 助手的综合能力评估基准，包含 466 个任务。GAIA 的设计理念：一个好的 AI 助手应该在完成端到端任务时表现出色，而不仅仅是回答事实性问题。任务要求 Agent 自主规划、搜索、推理、组合多源信息。
            - paragraph [ref=e1931]:
              - strong [ref=e1932]: 四级基准
              - text: ：
            - table [ref=e1934]:
              - rowgroup [ref=e1935]:
                - row "层级 能力要求 典型任务" [ref=e1936]:
                  - columnheader "层级" [ref=e1937]
                  - columnheader "能力要求" [ref=e1938]
                  - columnheader "典型任务" [ref=e1939]
              - rowgroup [ref=e1940]:
                - row "基础层 文档解析、简单推理 从 PDF 中提取关键数据并计算" [ref=e1941]:
                  - cell "基础层" [ref=e1942]
                  - cell "文档解析、简单推理" [ref=e1943]
                  - cell "从 PDF 中提取关键数据并计算" [ref=e1944]
                - row "进阶层 多模态交互、资源整合 分析 PPT 内容并生成邮件，整合网络资源完成调研" [ref=e1945]:
                  - cell "进阶层" [ref=e1946]
                  - cell "多模态交互、资源整合" [ref=e1947]
                  - cell "分析 PPT 内容并生成邮件，整合网络资源完成调研" [ref=e1948]
                - row "专家层 跨领域知识迁移 结合医疗知识和法律文书审核" [ref=e1949]:
                  - cell "专家层" [ref=e1950]
                  - cell "跨领域知识迁移" [ref=e1951]
                  - cell "结合医疗知识和法律文书审核" [ref=e1952]
                - row "挑战层 动态环境适应 根据实时数据调整策略" [ref=e1953]:
                  - cell "挑战层" [ref=e1954]
                  - cell "动态环境适应" [ref=e1955]
                  - cell "根据实时数据调整策略" [ref=e1956]
            - paragraph [ref=e1957]: 数据：仅有约 8.7% 的开源 Agent 能通过全部专家层测试。主要瓶颈包括：长上下文记忆能力不足、跨模态语义对齐误差、异常处理策略缺失。
            - heading "数据生成质量评估#" [level=3] [ref=e1958]:
              - text: 数据生成质量评估
              - link "#" [ref=e1959] [cursor=pointer]:
                - /url: "#数据生成质量评估"
            - paragraph [ref=e1960]: 针对 Agent 系统的输出（如生成的报告、翻译、摘要），除客观指标外还需要质量评估。主要方法：
            - list [ref=e1961]:
              - listitem [ref=e1962]:
                - strong [ref=e1963]: LLM-as-Judge
                - text: ：用另一个更强的 LLM 作为评价者，对 Agent 的输出按多个维度打分。典型 prompt 模板：
            - generic [ref=e1964]:
              - code [ref=e1966]:
                - generic [ref=e1967]: 你是一位严格的评审者。请从以下几个维度对以下回答进行评分（1-5分）：
                - generic [ref=e1968]: 1. 准确性：回答中的事实是否都有依据？
                - generic [ref=e1969]: 2. 完整性：回答是否覆盖了问题的所有方面？
                - generic [ref=e1970]: 3. 相关性：回答的内容与问题是否直接相关？
                - generic [ref=e1971]: 4. 可读性：回答是否清晰、结构化？
                - generic [ref=e1973]: "问题：{question}"
                - generic [ref=e1974]: "Agent的回答：{answer}"
                - generic [ref=e1975]: 请以JSON格式输出评分和理由。
              - generic [ref=e1976]: plaintext
              - button [ref=e1977] [cursor=pointer]:
                - img [ref=e1979]
                - text: Copied!
            - list [ref=e1981]:
              - listitem [ref=e1982]:
                - strong [ref=e1983]: Win Rate
                - text: ：将 Agent A 与 Agent B（如基线方案）的输出对比，计算人类或 LLM 评价者更偏好 A 的百分比
            - separator [ref=e1984]
            - heading "Agent 安全风险#" [level=2] [ref=e1985]:
              - text: Agent 安全风险
              - link "#" [ref=e1986] [cursor=pointer]:
                - /url: "#agent-安全风险"
            - heading "提示注入（Prompt Injection）#" [level=3] [ref=e1987]:
              - text: 提示注入（Prompt Injection）
              - link "#" [ref=e1988] [cursor=pointer]:
                - /url: "#提示注入prompt-injection"
            - paragraph [ref=e1989]: 提示注入是最常见的 Agent 安全问题。攻击者通过在用户输入中嵌入恶意指令，让 Agent 忽略原始系统提示并执行攻击者的意图。分为直接注入（用户输入直接包含恶意指令）和间接注入（恶意指令通过 Agent 检索到的外部文档内容传入）。
            - paragraph [ref=e1990]:
              - strong [ref=e1991]: 缓解策略
              - text: ：将用户输入与系统指令在上下文中用明确的边界标记隔离；对 Agent 可以执行的工具有严格的权限控制；对于高风险操作（文件删除、数据修改、支付）设置人工确认环节。
            - heading "工具滥用与权限逃逸#" [level=3] [ref=e1992]:
              - text: 工具滥用与权限逃逸
              - link "#" [ref=e1993] [cursor=pointer]:
                - /url: "#工具滥用与权限逃逸"
            - paragraph [ref=e1994]:
              - text: Agent 自主调用工具的能力如果缺乏限制，可能导致：工具被调用来执行其设计范围之外的操作（如搜索工具被用来构建隐私信息）；Agent 利用了权限提升获取本不该访问的数据；工具调用的参数超出安全范围（如文件读取工具被传入
              - code [ref=e1995]: ../../../etc/passwd
              - text: ）。
            - paragraph [ref=e1996]:
              - strong [ref=e1997]: 缓解策略
              - text: ：每个工具定义明确的参数范围约束；工具执行器的命令白名单、路径沙箱、超时控制；工具调用按风险等级分级（低风险自动执行、中风险记录日志、高风险人工确认）。
            - heading "数据泄露#" [level=3] [ref=e1998]:
              - text: 数据泄露
              - link "#" [ref=e1999] [cursor=pointer]:
                - /url: "#数据泄露"
            - paragraph [ref=e2000]: Agent 在执行过程中可能将敏感数据（API Key、用户隐私、内部文档）作为上下文的一部分传递给外部 LLM。另一方面，Agent 也可能从外部工具获取数据后错误地暴露给未授权的用户。
            - paragraph [ref=e2001]:
              - strong [ref=e2002]: 缓解策略
              - text: ：在输入上下文中自动检测和脱敏敏感信息；对 Agent 的输出进行后处理过滤；工具的执行环境隔离（TerminalTool 的工作目录沙箱）。
            - heading "输出安全#" [level=3] [ref=e2003]:
              - text: 输出安全
              - link "#" [ref=e2004] [cursor=pointer]:
                - /url: "#输出安全"
            - paragraph [ref=e2005]: Agent 的输出可能包含虚构信息（幻觉）、误导性内容、或未经核实的断言。当 Agent 具备工具调用能力时，输出的安全边界比纯文本 LLM 更广——Agent 可能调用工具执行了操作然后告诉用户”已执行”，但实际上并未执行（或执行了不同的操作）。
            - paragraph [ref=e2006]:
              - strong [ref=e2007]: 缓解策略
              - text: ：工具调用的执行结果必须如实反馈给用户；对于影响外部系统的操作，提供操作确认步骤；使用 Reflection 范式让 Agent 在执行完整操作前自我检查。
            - separator [ref=e2008]
