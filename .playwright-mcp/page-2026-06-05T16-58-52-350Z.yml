                  - cell "可靠性" [ref=e1204]
                  - cell "低，易主题漂移或死循环" [ref=e1205]
                  - cell "高，严格按流程执行" [ref=e1206]
                - row "可审计性 差，行为路径不可预期 好，执行路径可完全追踪" [ref=e1207]:
                  - cell "可审计性" [ref=e1208]
                  - cell "差，行为路径不可预期" [ref=e1209]
                  - cell "好，执行路径可完全追踪" [ref=e1210]
                - row "适用场景 发散型（创意写作、代码生成） 收敛型（企业自动化、金融核保）" [ref=e1211]:
                  - cell "适用场景" [ref=e1212]
                  - cell "发散型（创意写作、代码生成）" [ref=e1213]
                  - cell "收敛型（企业自动化、金融核保）" [ref=e1214]
            - paragraph [ref=e1215]: 两个流派并非互斥。实际系统往往混合使用：外层用 LangGraph 定义稳定的大流程，内层用 AutoGen 或 CAMEL 管理发散的子任务。
            - separator [ref=e1216]
            - separator [ref=e1217]
            - heading "记忆与检索#" [level=2] [ref=e1218]:
              - text: 记忆与检索
              - link "#" [ref=e1219] [cursor=pointer]:
                - /url: "#记忆与检索"
            - heading "两大痛点#" [level=3] [ref=e1220]:
              - text: 两大痛点
              - link "#" [ref=e1221] [cursor=pointer]:
                - /url: "#两大痛点"
            - paragraph [ref=e1222]:
              - strong [ref=e1223]: LLM 无状态
              - text: ：每次 API 调用都是独立计算，模型不会自动”记住”之前的对话内容。这导致四个问题——上下文丢失（多轮对话中重要信息被遗忘）、个性化缺失（模型无法记住用户偏好）、学习能力受限（Agent 不能在每次交互中积累经验）、一致性问题（同一用户的后续请求被视为完全新的对话）。
            - paragraph [ref=e1224]:
              - strong [ref=e1225]: 模型知识有限
              - text: ：训练数据有截止日期，模型不了解事实发生在数据截止之后的事件。训练数据以通用互联网语料为主，专业领域知识覆盖不足。模型在不确定时倾向于”编造”而非”承认不知道”（幻觉）。
            - heading "记忆系统架构#" [level=3] [ref=e1226]:
              - text: 记忆系统架构
              - link "#" [ref=e1227] [cursor=pointer]:
                - /url: "#记忆系统架构"
