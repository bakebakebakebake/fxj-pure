                  - cell "感知记忆" [ref=e1364]:
                    - strong [ref=e1365]: 感知记忆
                  - cell "感官输入缓存" [ref=e1366]
                  - cell "分模态向量集合" [ref=e1367]
                  - cell "同模态或跨模态检索" [ref=e1368]
                  - cell "图片视觉特征、音频声学特征的暂存和匹配" [ref=e1369]
            - heading "评分机制#" [level=3] [ref=e1370]:
              - text: 评分机制
              - link "#" [ref=e1371] [cursor=pointer]:
                - /url: "#评分机制"
            - paragraph [ref=e1372]: 不同类型记忆的检索评分公式各有侧重，突出各自的特化方向：
            - paragraph [ref=e1373]:
              - strong [ref=e1374]: 情景记忆
              - text: ：
              - code [ref=e1375]: score = (向量相似度 × 0.8 + 时间近因性 × 0.2) × (0.8 + importance × 0.4)
            - list [ref=e1376]:
              - listitem [ref=e1377]: 向量相似度权重高：因为情景记忆的核心是回忆”类似的事件”
              - listitem [ref=e1378]: 时间近因性权重较低但不可忽略：较新的事件通常有更高的参考价值
              - listitem [ref=e1379]: importance 参数调节：重要性评分（0–1），用户可以手动指定或系统自动推算
            - paragraph [ref=e1380]:
              - strong [ref=e1381]: 语义记忆
              - text: ：
              - code [ref=e1382]: score = (向量相似度 × 0.7 + 图相似度 × 0.3) × (0.8 + importance × 0.4)
            - list [ref=e1383]:
              - listitem [ref=e1384]: 向量相似度仍然主导但比例略低：因为语义不仅靠向量匹配
              - listitem [ref=e1385]: 图相似度权重 0.3：通过 Neo4j 中的知识图谱关系（如 A”属于”B、C”影响”D）来衡量概念之间的关联度
              - listitem [ref=e1386]:
                - text: 如果 Neo4j 不可用（未配置图数据库），图相似度回退为 0，分数退化为
                - code [ref=e1387]: 向量相似度 × (0.8 + importance × 0.4)
            - paragraph [ref=e1388]:
              - strong [ref=e1389]: 工作记忆
              - text: ：
              - code [ref=e1390]: final_score = base_relevance × 时间衰减 × (0.8 + importance × 0.4)
            - list [ref=e1391]:
              - listitem [ref=e1392]: 时间衰减函数：刚写入的工作记忆分数 > 较旧的（TTL 趋近到期时分数趋近于 0）
              - listitem [ref=e1393]: 工作记忆不依赖向量检索，因为它的容量有上限（默认 N 条），直接线性遍历即可
            - heading "MemoryTool 核心操作#" [level=3] [ref=e1394]:
              - text: MemoryTool 核心操作
              - link "#" [ref=e1395] [cursor=pointer]:
                - /url: "#memorytool-核心操作"
            - paragraph [ref=e1396]: 记忆系统通过 MemoryTool 对外暴露统一接口，支持以下操作：
            - list [ref=e1397]:
              - listitem [ref=e1398]:
                - strong [ref=e1399]: add
                - text: ：添加记忆条目，指定类型（working / episodic / semantic / perceptual）和重要性评分 importance（0–1）
              - listitem [ref=e1400]:
                - strong [ref=e1401]: search
                - text: ：搜索记忆，支持按类型过滤（搜索一种或多种类型的记忆）、按最小重要性阈值筛选
              - listitem [ref=e1402]:
                - strong [ref=e1403]: forget
                - text: ：遗忘，支持基于重要性策略（遗忘最低重要性的条目）、基于时间策略（遗忘最早的条目）、基于容量策略（当条目数超过上限时自动清理最不重要的）
              - listitem [ref=e1404]:
                - strong [ref=e1405]: consolidate
                - text: ：整合，将短期记忆的重要信息提取并转换为长期记忆。整合算法流程为：从 WorkingMemory 中筛选出 importance 高于阈值（默认 0.6）的条目 → 将条目内容与已有 SemanticMemory 做语义匹配（判断是否存在相似度高于 0.85 的已有条目）→ 对匹配到的条目执行合并（追加引用计数并更新时间戳），对未匹配的条目新建 SemanticMemory 条目 → 从 WorkingMemory 中移除已整合的条目。consolidate 可手动触发或按固定周期（如每 10 轮交互）自动执行。
              - listitem [ref=e1406]:
                - strong [ref=e1407]: summary / stats / update / remove / clear_all
                - text: ：其他管理操作
            - heading "RAG 系统#" [level=3] [ref=e1408]:
              - text: RAG 系统
              - link "#" [ref=e1409] [cursor=pointer]:
                - /url: "#rag-系统"
            - heading "文档处理与 Chunk 策略#" [level=4] [ref=e1410]:
              - text: 文档处理与 Chunk 策略
              - link "#" [ref=e1411] [cursor=pointer]:
                - /url: "#文档处理与-chunk-策略"
            - paragraph [ref=e1412]: 任意格式文档（PDF、Word、Markdown、HTML 等）→ MarkItDown 工具统一转换为 Markdown 格式 → 解析标题层次（构建文档结构树）→ 段落语义分割（以自然段落为单位，保持语义完整性）→ Token 长度控制与 Chunk Overlap → 嵌入向量化 → 写入向量数据库（按命名空间隔离不同文档集）。
            - paragraph [ref=e1413]: Chunk 策略选择直接影响 RAG 的检索质量。四种主流策略：
            - table [ref=e1415]:
              - rowgroup [ref=e1416]:
                - row "策略 说明 召回率 适用场景" [ref=e1417]:
                  - columnheader "策略" [ref=e1418]
                  - columnheader "说明" [ref=e1419]
                  - columnheader "召回率" [ref=e1420]
                  - columnheader "适用场景" [ref=e1421]
              - rowgroup [ref=e1422]:
                - row "固定大小切分 按固定 token 数切分（如 512 token），简单粗暴 约 67% 粗略原型、文档结构不明确" [ref=e1423]:
                  - cell "固定大小切分" [ref=e1424]:
                    - strong [ref=e1425]: 固定大小切分
                  - cell "按固定 token 数切分（如 512 token），简单粗暴" [ref=e1426]
                  - cell "约 67%" [ref=e1427]
                  - cell "粗略原型、文档结构不明确" [ref=e1428]
                - row "基于结构切分 利用 HTML/Markdown 标题层级做切分点 约 74% 有清晰标题结构的文档" [ref=e1429]:
                  - cell "基于结构切分" [ref=e1430]:
                    - strong [ref=e1431]: 基于结构切分
                  - cell "利用 HTML/Markdown 标题层级做切分点" [ref=e1432]
                  - cell "约 74%" [ref=e1433]
                  - cell "有清晰标题结构的文档" [ref=e1434]
                - row "递归切分 按分隔符层级（段落→句子→词）迭代分割 约 80% 通用场景，兼顾粒度与语义" [ref=e1435]:
                  - cell "递归切分" [ref=e1436]:
                    - strong [ref=e1437]: 递归切分
                  - cell "按分隔符层级（段落→句子→词）迭代分割" [ref=e1438]
                  - cell "约 80%" [ref=e1439]
                  - cell "通用场景，兼顾粒度与语义" [ref=e1440]
                - row "语义切分 用 Embedding 相似度检测语义边界，语义突变处分割 约 91% 高质量需求、知识库型系统" [ref=e1441]:
                  - cell "语义切分" [ref=e1442]:
                    - strong [ref=e1443]: 语义切分
                  - cell "用 Embedding 相似度检测语义边界，语义突变处分割" [ref=e1444]
                  - cell "约 91%" [ref=e1445]
                  - cell "高质量需求、知识库型系统" [ref=e1446]
            - paragraph [ref=e1447]:
              - strong [ref=e1448]: Parent-Child Chunk 模式
              - text: ：小块（约 300 token）负责召回，大块（约 1200 token）负责生成。检索时命中小块，但将对应父段落放入 LLM 上下文中。小块提高了检索精确度，大块保证了生成时上下文完整。
            - heading "检索结果重排序（Re-ranking）#" [level=4] [ref=e1449]:
              - text: 检索结果重排序（Re-ranking）
              - link "#" [ref=e1450] [cursor=pointer]:
                - /url: "#检索结果重排序re-ranking"
            - paragraph [ref=e1451]: 向量检索的第一轮结果（Top-30 到 Top-100）中，排名靠前的结果不一定最相关。重排序的目的：用更精确的模型对初筛结果二次排序。
            - paragraph [ref=e1452]:
              - strong [ref=e1453]: 三种重排序方法
              - text: ：
            - list [ref=e1454]:
              - listitem [ref=e1455]:
                - strong [ref=e1456]: Cross-Encoder Reranker
                - text: ：将 query 与每个候选文档拼接后送入一个专门的排序模型（如 BGE-Reranker、Cohere Rerank），输出相关性分数。比向量检索（Bi-Encoder）更精确，但需要逐对计算、延迟更高。
              - listitem [ref=e1457]:
                - strong [ref=e1458]: LLM Rerank
                - text: ：利用 LLM 对候选文档进行排序，可解释性强（LLM 可以给出排序理由），但计算成本最高。
              - listitem [ref=e1459]:
                - strong [ref=e1460]: 规则重排
                - text: ：按时间近因性、来源权威性、权限级别等元数据规则做排序，不依赖模型。
            - paragraph [ref=e1461]:
              - strong [ref=e1462]: 推荐检索链路
              - text: ：元数据预过滤 → 多路召回（向量 + 关键词，粗召回 30–100 条）→ 去重合并 → Cross-Encoder Rerank 选出 5–10 条 → 上下文压缩 → 送入 LLM。
            - heading "高级检索策略#" [level=4] [ref=e1463]:
              - text: 高级检索策略
              - link "#" [ref=e1464] [cursor=pointer]:
                - /url: "#高级检索策略"
            - paragraph [ref=e1465]:
              - strong [ref=e1466]: MQE（Multi-Query Expansion，多查询扩展）
              - text: ：
            - paragraph [ref=e1467]: 将用户的原始问题用 LLM 扩展成多个语义等价但表达不同的子问题（如”什么是 RAG”扩展为”RAG 的定义是什么""检索增强生成如何工作""RAG 和微调有什么区别”），每个子问题独立执行向量检索，合并所有检索结果去重后返回。MQE 提高了对模糊问题的召回率——同一个问题有多个表达方式，总有一种能匹配到文档中的相关表述。
            - paragraph [ref=e1468]:
              - strong [ref=e1469]: HyDE（Hypothetical Document Embeddings，假想文档嵌入）
              - text: ：
            - paragraph [ref=e1470]: 先让 LLM 根据用户问题生成一段”假想答案”（不需要十分准确，只需要在词汇和风格上接近目标文档），用这段假想答案的嵌入向量去检索目标文档。HyDE 利用了嵌入空间的”文本形态相似性”——问题和文档往往写法不同（问题短而口语化、文档长篇且专业），但两段假想答案和实际文档在词语层面更接近。适用于用户提问方式与知识库文档写法差异较大的场景。
            - heading "Memory 与 RAG 的关系#" [level=3] [ref=e1471]:
              - text: Memory 与 RAG 的关系
              - link "#" [ref=e1472] [cursor=pointer]:
                - /url: "#memory-与-rag-的关系"
            - paragraph [ref=e1473]: RAG 负责找知识，Memory 负责记历程。RAG 回答当前问题（从外部知识库检索事实性信息），Memory 支撑长期个性化（记住用户的偏好、行为模式和历史交互）。RAG 的知识源可以独立更新（替换知识库即可），Memory 的内容随交互持续积累（每次交互都是增量写入）。
            - paragraph [ref=e1474]: 典型协作模式：
            - list [ref=e1475]:
              - listitem [ref=e1476]: 加载新资料时：RAG 存文档 + Memory 记录”用户加载了什么资料”这一事件
              - listitem [ref=e1477]: 提问回答时：RAG 检索资料生成答案 + Memory 记录问题和获得答案的学习轨迹
              - listitem [ref=e1478]: 复盘学习时：Memory 回顾历史问题和笔记 + RAG 补充知识细节
              - listitem [ref=e1479]: 制定计划时：RAG 提供领域知识 + Memory 提供用户进度和偏好
            - separator [ref=e1480]
            - heading "上下文工程#" [level=2] [ref=e1481]:
              - text: 上下文工程
              - link "#" [ref=e1482] [cursor=pointer]:
                - /url: "#上下文工程"
            - heading "系统提示（System Prompt）设计原则#" [level=3] [ref=e1483]:
              - text: 系统提示（System Prompt）设计原则
              - link "#" [ref=e1484] [cursor=pointer]:
                - /url: "#系统提示system-prompt设计原则"
            - paragraph [ref=e1485]: 系统提示是上下文中优先级最高的固定部分，其设计质量直接影响 Agent 的行为边界和应对复杂场景的能力。以下几点是实践中需要关注的：
            - list [ref=e1486]:
              - listitem [ref=e1487]:
                - strong [ref=e1488]: 明确角色定位
                - text: ：定义 Agent 的身份、任务范围和限制条件。例如”你是代码审查助手，专注于 Python 后端代码”。角色定义帮助模型在任务边界内推理，减少”越界”行为。
              - listitem [ref=e1489]:
                - strong [ref=e1490]: 工具描述标准化
                - text: ：每个工具的名称、功能、参数、适用场景和不适用场景都需要在系统提示中明确定义。工具描述的质量决定 Agent 能否在正确场景下选择正确的工具。
              - listitem [ref=e1491]:
                - strong [ref=e1492]: 行为约束先于功能描述
                - text: ：先说”禁止做什么”再说”可以做什么”。安全约束（如”不允许执行
                - code [ref=e1493]: rm
                - text: 命令”）放在功能描述之前，优先级更高。
              - listitem [ref=e1494]:
                - strong [ref=e1495]: 动态注入 vs 静态固化
                - text: ：固定信息（角色、规则、安全约束）写在系统提示中并长期不变；运行时信息（任务描述、工具列表）由 ContextBuilder 动态拼装。不将动态信息固化在系统提示中。
              - listitem [ref=e1496]:
                - strong [ref=e1497]: 保持精简
                - text: ：系统提示并非越长越好。超出必要长度的系统提示会被模型同等对待为”需要关注的上下文”，稀释对实际任务信息的关注力。核心规则应该在 500 token 以内覆盖完毕。
            - heading "上下文工程 vs 提示工程#" [level=3] [ref=e1498]:
              - text: 上下文工程 vs 提示工程
              - link "#" [ref=e1499] [cursor=pointer]:
                - /url: "#上下文工程-vs-提示工程"
            - paragraph [ref=e1500]:
              - text: 提示工程关注”怎么写好 prompt”，其核心问题是单轮或短任务内的指令优化。上下文工程则关注一个更广泛的问题：
              - strong [ref=e1501]: 每一次调用模型前，应该把哪些信息、以什么结构、在多大预算内交给模型
              - text: 。需要考虑的对象包括系统提示（固定身份和行为规则）、工具描述（可用工具的 schema 和调用说明）、对话历史（过去的交互记录）、记忆（从长期记忆中召回的相关片段）、RAG 结果（从外部知识库检索的信息）、NoteTool 输出（结构化笔记）、TerminalTool 输出（文件系统探索结果）、Agent 状态（规划进度和未完成任务）。
            - heading "上下文腐蚀（Context Rot）#" [level=3] [ref=e1502]:
              - text: 上下文腐蚀（Context Rot）
              - link "#" [ref=e1503] [cursor=pointer]:
                - /url: "#上下文腐蚀context-rot"
            - paragraph [ref=e1504]: 随着上下文窗口中 token 数量增加，模型从中准确回忆和使用关键信息的能力下降。原因有三：
            - list [ref=e1505]:
              - listitem [ref=e1506]:
                - strong [ref=e1507]: 注意力被拉薄
                - text: ：Transformer 的自注意力需要计算所有 token 两两之间的关联。当 token 数越多，模型在每一个 token 上的注意力权重越分散，关键信息被稀释。
              - listitem [ref=e1508]:
                - strong [ref=e1509]: 噪声增多
                - text: ：无关的历史记录、重复的工具输出、过期的中间计划占据了有效的上下文空间，使模型难以抓住真正重要的信息。
              - listitem [ref=e1510]:
                - strong [ref=e1511]: 训练分布限制
                - text: ：模型在预训练阶段接触的文本绝大多数在几千 token 以内，对超长序列中的信息提取经验不足。
            - heading "GSSC 流水线#" [level=3] [ref=e1512]:
              - text: GSSC 流水线
              - link "#" [ref=e1513] [cursor=pointer]:
                - /url: "#gssc-流水线"
            - paragraph [ref=e1514]: ContextBuilder 的核心框架包含四个阶段：
            - heading "第一阶段：Gather（汇集）#" [level=4] [ref=e1515]:
              - text: 第一阶段：Gather（汇集）
              - link "#" [ref=e1516] [cursor=pointer]:
                - /url: "#第一阶段gather汇集"
            - paragraph [ref=e1517]: 从多个来源收集候选信息，包括：
            - list [ref=e1518]:
              - listitem [ref=e1519]:
                - strong [ref=e1520]: 系统指令
                - text: ：最高优先级，通常固定不变
              - listitem [ref=e1521]:
                - strong [ref=e1522]: MemoryTool
                - text: ：从长期记忆中检索的相关记忆条目
              - listitem [ref=e1523]:
                - strong [ref=e1524]: RAGTool
                - text: ：从外部知识库检索的知识片段
              - listitem [ref=e1525]:
                - strong [ref=e1526]: 对话历史
                - text: ：仅保留最近 N 条记录（默认 N=20，可配置）
              - listitem [ref=e1527]:
                - strong [ref=e1528]: 自定义信息包
                - text: ：NoteTool 的结构化笔记、TerminalTool 的输出等
            - heading "第二阶段：Select（选择）#" [level=4] [ref=e1529]:
              - text: 第二阶段：Select（选择）
              - link "#" [ref=e1530] [cursor=pointer]:
                - /url: "#第二阶段select选择"
            - paragraph [ref=e1531]: 采用加权评分机制对候选信息进行筛选：
            - generic [ref=e1532]:
              - code [ref=e1534]:
                - generic [ref=e1535]: combined_score = relevance_weight × relevance_score + recency_weight × recency_score
              - generic [ref=e1536]: plaintext
              - button [ref=e1537] [cursor=pointer]:
                - img [ref=e1539]
                - text: Copied!
            - paragraph [ref=e1541]:
              - text: 流程：先分离系统指令（始终保留）→ 为每个候选信息计算综合分数 → 过滤低于
              - code [ref=e1542]: min_relevance
              - text: 阈值的信息 → 按综合分数排序 → 贪心填充（从高分到低分逐个加入，直到 token 上限）。
            - paragraph [ref=e1543]: 超出上限的信息不会丢弃而是保留到下一轮。下一轮 Gather 仍会考虑它们，随时间衰减的 recency_score 可能使它们再次被选中。
            - heading "第三阶段：Structure（结构化）#" [level=4] [ref=e1544]:
              - text: 第三阶段：Structure（结构化）
              - link "#" [ref=e1545] [cursor=pointer]:
                - /url: "#第三阶段structure结构化"
            - paragraph [ref=e1546]: 将选中的信息组织为结构化的模板：
            - generic [ref=e1547]:
              - code [ref=e1549]:
                - generic [ref=e1550]: "[Role & Policies] ← 系统指令（身份和规则）"
                - generic [ref=e1551]: "[Task] ← 当前任务描述"
                - generic [ref=e1552]: "[Evidence] ← RAG 检索结果、记忆片段"
                - generic [ref=e1553]: "[Context] ← 对话历史摘要或近期记录"
                - generic [ref=e1554]: "[Output] ← 输出格式要求和示例"
              - generic [ref=e1555]: plaintext
              - button [ref=e1556] [cursor=pointer]:
                - img [ref=e1558]
                - text: Copied!
            - paragraph [ref=e1560]: 固定模板的意义在于：让模型每次看到的上下文信息在同一个位置出现，模型学会从固定位置寻找特定类型的信息。如果每次信息排列方式都不同，模型需要在推理时额外花费 attention 来定位信息。
            - heading "第四阶段：Compress（压缩）#" [level=4] [ref=e1561]:
              - text: 第四阶段：Compress（压缩）
              - link "#" [ref=e1562] [cursor=pointer]:
                - /url: "#第四阶段compress压缩"
            - paragraph [ref=e1563]: 当所有候选信息即使经过选择仍超出上下文窗口时，对已构成但超限的上下文进行兜底压缩。压缩规则：优先压缩重复度高的信息（如多个相似文档片段只保留一个）、其次压缩时间较早且评分低的信息、最后压缩辅助性信息（如工具使用示例）。保留优先级：关键决策 > 未解决问题 > 约束条件 > 下一步行动 > 背景信息。
            - heading "NoteTool（结构化笔记）#" [level=3] [ref=e1564]:
              - text: NoteTool（结构化笔记）
              - link "#" [ref=e1565] [cursor=pointer]:
                - /url: "#notetool结构化笔记"
            - paragraph [ref=e1566]: 面向长时程任务的结构化外部记忆。Agent 在执行过程中可以主动写入笔记，笔记内容持久化到本地文件，在后续交互中由 ContextBuilder 检索加载。
            - paragraph [ref=e1567]: 格式为 Markdown + YAML 前置元数据。分类体系：
            - list [ref=e1568]:
              - listitem [ref=e1569]:
                - strong [ref=e1570]: blocker
                - text: ：当前卡点或阻塞项（如”xxx 模块需要 xxx 库，但当前环境未安装”）
              - listitem [ref=e1571]:
                - strong [ref=e1572]: action
                - text: ：已执行或待执行的操作（如”已修改 xxx 文件，待验证”）
              - listitem [ref=e1573]:
                - strong [ref=e1574]: task_state
                - text: ：任务进度状态（如”Phase 1 完成 80%，剩下 xxx 子任务”）
              - listitem [ref=e1575]:
                - strong [ref=e1576]: conclusion
                - text: ：已形成的结论（如”确定了该项目的前后端分离方案”）
              - listitem [ref=e1577]:
                - strong [ref=e1578]: reference
                - text: ：参考信息（如”xxx API 的文档链接""xxx 配置文件路径”）
              - listitem [ref=e1579]:
                - strong [ref=e1580]: scratch
                - text: ：临时草稿和中间结果
            - heading "TerminalTool（即时文件系统访问）#" [level=3] [ref=e1581]:
              - text: TerminalTool（即时文件系统访问）
              - link "#" [ref=e1582] [cursor=pointer]:
                - /url: "#terminaltool即时文件系统访问"
            - paragraph [ref=e1583]: 实现 JIT（Just-in-Time）上下文——在需要时才去探索文件系统，而不是把所有文件内容预先加载到上下文中。
            - paragraph [ref=e1584]: 安全机制：
            - list [ref=e1585]:
              - listitem [ref=e1586]:
                - strong [ref=e1587]: 命令白名单
                - text: ：仅允许指定的命令（如
                - code [ref=e1588]: ls
                - text: 、
                - code [ref=e1589]: cat
                - text: 、
                - code [ref=e1590]: find
                - text: 、
                - code [ref=e1591]: grep
                - text: ）执行，禁止
                - code [ref=e1592]: rm
                - text: 、
                - code [ref=e1593]: sudo
                - text: 等危险命令
              - listitem [ref=e1594]:
                - strong [ref=e1595]: 工作目录沙箱
                - text: ：限定命令只能在指定的根目录下执行，禁止
                - code [ref=e1596]: ..
                - text: 越级访问
              - listitem [ref=e1597]:
                - strong [ref=e1598]: 超时控制
                - text: ：命令执行超过指定时限时自动终止
              - listitem [ref=e1599]:
                - strong [ref=e1600]: 输出大小限制
                - text: ：命令输出的内容超过指定 token 数时自动截断
            - paragraph [ref=e1601]: 适用场景：日志分析（按需搜索特定模式）、代码库探索（查找文件、搜索定义）、数据文件分析（预览文件结构）。
            - heading "长时程任务三大策略#" [level=3] [ref=e1602]:
              - text: 长时程任务三大策略
              - link "#" [ref=e1603] [cursor=pointer]:
                - /url: "#长时程任务三大策略"
            - table [ref=e1605]:
              - rowgroup [ref=e1606]:
                - row "策略 解决的问题 典型做法 适用场景" [ref=e1607]:
                  - columnheader "策略" [ref=e1608]
                  - columnheader "解决的问题" [ref=e1609]
                  - columnheader "典型做法" [ref=e1610]
                  - columnheader "适用场景" [ref=e1611]
              - rowgroup [ref=e1612]:
                - row "Compaction 对话历史过长，窗口接近上限 用 LLM 高保真总结历史后重启上下文 长时间连续对话、持续研究" [ref=e1613]:
                  - cell "Compaction" [ref=e1614]:
                    - strong [ref=e1615]: Compaction
                  - cell "对话历史过长，窗口接近上限" [ref=e1616]
                  - cell "用 LLM 高保真总结历史后重启上下文" [ref=e1617]
                  - cell "长时间连续对话、持续研究" [ref=e1618]
                - row "Structured Note-taking 关键状态需跨窗口持续保存 将结论 / 阻塞 / 计划写入 NoteTool 多天项目维护、复杂计划" [ref=e1619]:
                  - cell "Structured Note-taking" [ref=e1620]:
                    - strong [ref=e1621]: Structured Note-taking
                  - cell "关键状态需跨窗口持续保存" [ref=e1622]
                  - cell "将结论 / 阻塞 / 计划写入 NoteTool" [ref=e1623]
                  - cell "多天项目维护、复杂计划" [ref=e1624]
                - row "Sub-agent 单一上下文无法容纳多方向并行探索 主 Agent 规划，子 Agent 独立探索后回传摘要 大规模代码库分析、多方排查" [ref=e1625]:
                  - cell "Sub-agent" [ref=e1626]:
                    - strong [ref=e1627]: Sub-agent
                  - cell "单一上下文无法容纳多方向并行探索" [ref=e1628]
                  - cell "主 Agent 规划，子 Agent 独立探索后回传摘要" [ref=e1629]
                  - cell "大规模代码库分析、多方排查" [ref=e1630]
            - heading "上下文工程的系统层级#" [level=3] [ref=e1631]:
              - text: 上下文工程的系统层级
              - link "#" [ref=e1632] [cursor=pointer]:
                - /url: "#上下文工程的系统层级"
            - paragraph [ref=e1633]:
              - text: 上下文管理并非单一工具能解决的问题，需要在多个抽象层级上协同：
              - strong [ref=e1634]: TerminalTool
              - text: 工作在”即时访问层”（当前轮按需加载）→
              - strong [ref=e1635]: MemoryTool
              - text: 工作在”会话记忆层”（会话内到跨会话）→
              - strong [ref=e1636]: NoteTool
              - text: 工作在”持久笔记层”（跨天跨会话）→
              - strong [ref=e1637]: ContextBuilder
              - text: 工作在”上下文编排层”（每次模型调用前的信息汇总）。
            - heading "实践原则#" [level=3] [ref=e1638]:
              - text: 实践原则
              - link "#" [ref=e1639] [cursor=pointer]:
                - /url: "#实践原则"
            - list [ref=e1640]:
              - listitem [ref=e1641]: 上下文不是越多越好，而是越相关、越新、越结构化越好
              - listitem [ref=e1642]: 系统提示要稳定，但不能把复杂业务流程全部硬塞进提示
              - listitem [ref=e1643]: 工具集要小而清晰，职责单一、边界清楚
              - listitem [ref=e1644]: 长程任务必须有外部状态层，不能只依赖对话历史
              - listitem [ref=e1645]: JIT 上下文（TerminalTool）适合动态信息，RAG 适合稳定、语义化、可复用的知识
              - listitem [ref=e1646]: 压缩要保留决策、约束、未解决问题和下一步
              - listitem [ref=e1647]: 笔记必须定期整理（consolidate），否则会从”外部记忆”变成”外部噪声”
              - listitem [ref=e1648]: 高风险工具调用必须有安全边界和人类审批
            - separator [ref=e1649]
            - heading "Agent Skills#" [level=2] [ref=e1650]:
              - text: Agent Skills
              - link "#" [ref=e1651] [cursor=pointer]:
                - /url: "#agent-skills"
            - paragraph [ref=e1652]: Agent Skills 规范由 Anthropic 提出，定义了如何将能力打包为可以被 Agent 发现和使用的方式。
            - heading "渐进式披露（Progressive Disclosure）#" [level=3] [ref=e1653]:
              - text: 渐进式披露（Progressive Disclosure）
              - link "#" [ref=e1654] [cursor=pointer]:
                - /url: "#渐进式披露progressive-disclosure"
            - paragraph [ref=e1655]: 将技能信息分为三层，避免一次性将所有内容塞入上下文窗口：
            - list [ref=e1656]:
              - listitem [ref=e1657]:
                - strong [ref=e1658]: 元数据层
                - text: ：约 100 tokens 每技能，包含技能名称、一句话描述、关键标签。当 Agent 需要选择技能时，仅加载元数据层即可进行初步筛选。
              - listitem [ref=e1659]:
                - strong [ref=e1660]: 技能主体
                - text: ：技能的核心信息——具体能做什么、需要什么工具、输入输出格式。当 Agent 确认使用某个技能时再加载这一层。
              - listitem [ref=e1661]:
                - strong [ref=e1662]: 附加资源
                - text: ：示例代码、FAQ、详细文档。仅在 Agent 需要深入学习或在运行时遇到困难时加载。
            - paragraph [ref=e1663]: 这种设计使 Agent 能在有限的上下文空间中同时了解多种可用能力，仅在需要时深入某个技能的细节。
            - heading "SKILL.md 规范#" [level=3] [ref=e1664]:
              - text: SKILL.md 规范
              - link "#" [ref=e1665] [cursor=pointer]:
                - /url: "#skillmd-规范"
            - paragraph [ref=e1666]: 每个技能的描述文件，定义了以下关键字段：name（技能名称）、description（技能作用描述）、version（版本号）、allowed_tools（技能允许使用的工具列表）、workflow（工作流程说明）、best_practices（最佳实践和使用注意事项）。
            - heading "Agent Skills 与 MCP 的关系#" [level=3] [ref=e1667]:
              - text: Agent Skills 与 MCP 的关系
              - link "#" [ref=e1668] [cursor=pointer]:
                - /url: "#agent-skills-与-mcp-的关系"
            - paragraph [ref=e1669]: MCP 解决”连接性”问题——让智能体能够访问外部工具和数据。Agent Skills 解决”能力”问题——告诉智能体如何正确使用这些工具以达到某个目标。MCP 定义了通信的底层协议（如何传输工具调用和返回），Agent Skills 定义了上层使用方法（在什么场景下应该调用哪些工具、按什么顺序调用）。
            - separator [ref=e1670]
            - heading "Agent通信协议#" [level=2] [ref=e1671]:
              - text: Agent通信协议
              - link "#" [ref=e1672] [cursor=pointer]:
                - /url: "#agent通信协议"
            - heading "MCP（Model Context Protocol）#" [level=3] [ref=e1673]:
              - text: MCP（Model Context Protocol）
              - link "#" [ref=e1674] [cursor=pointer]:
                - /url: "#mcpmodel-context-protocol"
            - paragraph [ref=e1675]:
              - text: Anthropic 提出的开放协议，旨在标准化 LLM 应用程序与外部工具和数据源的交互方式。MCP 解决的是
              - strong [ref=e1676]: 连接性问题
              - text: ——让智能体能够访问外部工具和数据。
            - paragraph [ref=e1677]:
              - strong [ref=e1678]: 三层架构
              - text: ：
            - list [ref=e1679]:
              - listitem [ref=e1680]:
                - strong [ref=e1681]: Host（宿主层）
                - text: ：需要与外部系统交互的 LLM 应用，如 Claude Desktop、IDE 插件
              - listitem [ref=e1682]:
                - strong [ref=e1683]: Client（客户端层）
                - text: ：Host 内部与 MCP Server 建立连接的组件，负责管理连接生命周期
              - listitem [ref=e1684]:
                - strong [ref=e1685]: Server（服务器层）
                - text: ：暴露特定能力的轻量级服务，每个 Server 负责一个功能域（文件系统、数据库、外部 API）
            - paragraph [ref=e1686]:
              - strong [ref=e1687]: 三大核心能力
              - text: ：
            - list [ref=e1688]:
              - listitem [ref=e1689]:
                - strong [ref=e1690]: Tools
                - text: ：可主动调用的功能，如搜索、计算、API 请求。需要 Host 授权才能执行。
              - listitem [ref=e1691]:
                - strong [ref=e1692]: Resources
                - text: ：可被读取的数据源，如文件内容、数据库记录、API 返回结果。类似 REST API 的 GET 请求。Resources 支持两种获取方式：
                - strong [ref=e1693]: 直接读取
                - text: （Host 按 URI 请求资源内容，一次性获取完整数据）和
                - strong [ref=e1694]: 订阅模式
                - text: （Host 向 Server 订阅资源变更通知，当资源内容变化时 Server 主动推送更新，无需 Host 轮询）。Resources 还支持
                - strong [ref=e1695]: Resource Template
                - text: ——用 URI 模板（如
                - code [ref=e1696]: "file://{path}"
                - text: ）定义一类资源的模式，Host 在运行时填充模板参数后即可获取具体资源。
              - listitem [ref=e1697]:
                - strong [ref=e1698]: Prompts
                - text: ：预定义的 prompt 模板，指导 LLM 如何与特定资源或工具交互。
            - paragraph [ref=e1699]:
              - strong [ref=e1700]: 传输方式
              - text: ：
            - list [ref=e1701]:
              - listitem [ref=e1702]:
                - strong [ref=e1703]: stdio
                - text: ：MCP Server 与 Host 在同一进程，通过标准输入输出通信，适合嵌入式和本地部署
              - listitem [ref=e1704]:
                - strong [ref=e1705]: SSE（Server-Sent Events）
                - text: ：HTTP 长连接，Host 与 Server 分离，适合远程部署
              - listitem [ref=e1706]:
                - strong [ref=e1707]: Streamable HTTP
                - text: ：Anthropic 引入的流式 HTTP 传输方案。相比 SSE 的改进：统一了连接生命周期管理（支持长连接和按需短连接的自动切换）、内置心跳和重连机制（客户端断连后自动恢复）、支持双向流（Server 可以向 Host 推送更新，Host 也可以主动向 Server 发送请求）。仅在需要时建立连接，空闲时自动关闭。
            - paragraph [ref=e1708]:
              - strong [ref=e1709]: 与 Function Calling 的关系
              - text: ：互补而非竞争。Function Calling 是 LLM 模型的一种能力——从模型输出中识别需要调用工具的意图并生成结构化参数。MCP 是基础设施协议——统一了工具的注册、发现、调用方式。Function Calling 决定”是否需要调用工具”，MCP 决定”如何找到并调用工具”。
            - heading "A2A（Agent-to-Agent Protocol）#" [level=3] [ref=e1710]:
              - text: A2A（Agent-to-Agent Protocol）
              - link "#" [ref=e1711] [cursor=pointer]:
                - /url: "#a2aagent-to-agent-protocol"
            - paragraph [ref=e1712]: Google 提出的点对点 Agent 协作协议，解决的是不同 Agent 系统之间的互操作问题。每个 Agent 既是服务提供者也是服务消费者。
            - paragraph [ref=e1713]:
              - strong [ref=e1714]: 核心组件
              - text: ：
            - list [ref=e1715]:
              - listitem [ref=e1716]:
                - strong [ref=e1717]: Agent Card
                - text: ：Agent 的能力声明文件，JSON 格式，描述 Agent 的身份、支持的技能、接口端点。示例：
            - generic [ref=e1718]:
              - code [ref=e1720]:
                - generic [ref=e1721]: "{"
                - generic [ref=e1722]: "\"name\": \"research-assistant\","
                - generic [ref=e1723]: "\"description\": \"Deep research agent for academic papers\","
                - generic [ref=e1724]: "\"skills\": [\"paper_search\", \"summary_generation\", \"citation_analysis\"],"
                - generic [ref=e1725]: "\"endpoints\": {"
                - generic [ref=e1726]: "\"base_url\": \"http://localhost:8080\","
                - generic [ref=e1727]: "\"tasks\": \"/tasks\","
                - generic [ref=e1728]: "\"stream\": \"/tasks/stream\""
                - generic [ref=e1729]: "},"
                - generic [ref=e1730]: "\"auth\": { \"type\": \"api_key\", \"header\": \"X-API-Key\" }"
                - generic [ref=e1731]: "}"
              - generic [ref=e1732]: json
              - button [ref=e1733] [cursor=pointer]:
                - img [ref=e1735]
                - text: Copied!
            - list [ref=e1737]:
              - listitem [ref=e1738]:
                - strong [ref=e1739]: Task
                - text: ：任务的生命周期管理，包括任务的提交、状态跟踪、取消
              - listitem [ref=e1740]:
                - strong [ref=e1741]: Message
                - text: ：Agent 间的通信消息实体
              - listitem [ref=e1742]:
                - strong [ref=e1743]: Part
                - text: ：消息中的内容单元，可以是一段文本、一个文件引用、一个结构化数据块
            - paragraph [ref=e1744]: A2A 的优势：避免中心化协调器瓶颈（去除了单点故障和性能瓶颈）、天然支持流式与事件驱动通信（Agent 可以实时推送进度而非轮询）。
            - heading "ANP（Agent Network Protocol）#" [level=3] [ref=e1745]:
              - text: ANP（Agent Network Protocol）
              - link "#" [ref=e1746] [cursor=pointer]:
                - /url: "#anpagent-network-protocol"
            - paragraph [ref=e1747]: 开源社区提出的概念性协议框架，定位于大规模智能体网络的去中心化服务发现。类似微服务架构中的服务注册中心（Consul / Etcd），但 AGent 可以主动声明和撤销自己的能力注册，其他 Agent 通过查询网络发现可用的服务。
            - paragraph [ref=e1748]: ANP 在当前阶段生态尚不成熟，课程中作为概念性了解。
            - heading "协议定位对比#" [level=3] [ref=e1749]:
              - text: 协议定位对比
              - link "#" [ref=e1750] [cursor=pointer]:
                - /url: "#协议定位对比"
            - paragraph [ref=e1751]: 三种协议在 Agent 生态中处于不同层次：
            - list [ref=e1752]:
              - listitem [ref=e1753]: MCP 负责”接入外部能力”（LLM ↔ 工具 / 数据源），解决的是垂直集成问题
              - listitem [ref=e1754]: A2A 负责”多 Agent 编排”（Agent ↔ Agent），解决的是水平协作问题
              - listitem [ref=e1755]: ANP 负责”大规模服务发现”（Agent ↔ 网络），解决的是组织管理问题
            - paragraph [ref=e1756]: 三者可以共存和互补。一个典型的多 Agent 系统中：ANP 帮助 Agent 发现其他 Agent 和能力 → A2A 在发现后进行对等通信协作 → MCP 让每个 Agent 接入自己的工具和数据。
            - separator [ref=e1757]
            - heading "Agentic-RL#" [level=2] [ref=e1758]:
              - text: Agentic-RL
              - link "#" [ref=e1759] [cursor=pointer]:
                - /url: "#agentic-rl"
            - heading "从 LLM 训练到 Agentic RL#" [level=3] [ref=e1760]:
              - text: 从 LLM 训练到 Agentic RL
              - link "#" [ref=e1761] [cursor=pointer]:
                - /url: "#从-llm-训练到-agentic-rl"
            - paragraph [ref=e1762]: 核心思想是将 LLM 作为可学习策略，嵌入智能体的感知-决策-执行循环中，通过强化学习优化多步任务表现。传统的 Agent 构建方式依赖 prompt 工程——Agent 的行为完全由系统提示词固定，无法针对特定任务环境进行优化。Agentic RL 则允许 Agent 通过与环境交互的奖励信号来学习最优行为策略。
            - paragraph [ref=e1763]: Agentic RL 与传统 PBRFT（即 RLHF / PPO 用于文本偏好优化）的关键差异：
            - table [ref=e1765]:
              - rowgroup [ref=e1766]:
                - row "维度 传统 PBRFT Agentic RL" [ref=e1767]:
                  - columnheader "维度" [ref=e1768]
                  - columnheader "传统 PBRFT" [ref=e1769]
                  - columnheader "Agentic RL" [ref=e1770]
              - rowgroup [ref=e1771]:
                - row "状态空间 静态 prompt + 单轮回复 多轮交互过程中动态演化的上下文" [ref=e1772]:
                  - cell "状态空间" [ref=e1773]
                  - cell "静态 prompt + 单轮回复" [ref=e1774]
                  - cell "多轮交互过程中动态演化的上下文" [ref=e1775]
                - row "行动空间 仅文本生成 文本生成 + 工具调用参数生成 + 环境操作" [ref=e1776]:
                  - cell "行动空间" [ref=e1777]
                  - cell "仅文本生成" [ref=e1778]
                  - cell "文本生成 + 工具调用参数生成 + 环境操作" [ref=e1779]
                - row "奖励设计 人类偏好评分（单次输出质量） 任务完成度累积奖励（多步序列决策效果）" [ref=e1780]:
                  - cell "奖励设计" [ref=e1781]
                  - cell "人类偏好评分（单次输出质量）" [ref=e1782]
                  - cell "任务完成度累积奖励（多步序列决策效果）" [ref=e1783]
                - row "时间跨度 T=1（单步） T≫1（多步序列）" [ref=e1784]:
                  - cell "时间跨度" [ref=e1785]
                  - cell "T=1（单步）" [ref=e1786]
                  - cell "T≫1（多步序列）" [ref=e1787]
            - heading "GSM8K 数据集#" [level=3] [ref=e1788]:
              - text: GSM8K 数据集
              - link "#" [ref=e1789] [cursor=pointer]:
                - /url: "#gsm8k-数据集"
            - paragraph [ref=e1790]: GSM8K 是小学数学应用题数据集，包含 7,473 个训练样本和 1,319 个测试样本。题目涉及加减乘除、比例、单位换算等基础数学运算，多为两步以上推理。
            - paragraph [ref=e1791]: 在课程中的使用方式：
            - list [ref=e1792]:
              - listitem [ref=e1793]:
                - strong [ref=e1794]: SFT 格式
                - text: ：提供完整的问题和逐步解题过程，作为监督信号
              - listitem [ref=e1795]:
                - strong [ref=e1796]: RL 格式
                - text: ：仅提供问题文本和最终正确答案（只给一个数字），不提供解题过程
            - paragraph [ref=e1797]: RL 格式的设计意图：迫使模型通过自身的探索来发现正确的推理路径，而非模仿现成的解题过程。这更能反映 Agent 在真实环境中面对的”有目标无路径”的问题。
            - heading "奖励函数#" [level=3] [ref=e1798]:
              - text: 奖励函数
              - link "#" [ref=e1799] [cursor=pointer]:
                - /url: "#奖励函数"
            - paragraph [ref=e1800]: 三种奖励函数设计，各具不同的优化目标：
            - list [ref=e1801]:
              - listitem [ref=e1802]:
                - strong [ref=e1803]: AccuracyReward
                - text: ：答案正确时奖励 +1，错误时奖励 0。这是最直接的奖励信号，但只关注最终结果的正确性，不关心推理过程的质量。
              - listitem [ref=e1804]:
                - strong [ref=e1805]: LengthPenaltyReward
                - text: ：
                - strong [ref=e1806]: 仅当答案正确时
                - text: ，对过长的回答施加惩罚。解决 Agent”为了安全而冗余”的问题——如果一个 Agent 用了 500 token 的推理得到了正确答案，而另一个只用了 100 token，后者获得更高的奖励。
              - listitem [ref=e1807]:
                - strong [ref=e1808]: StepReward
                - text: ：奖励清晰的推理步骤。鼓励模型将推理过程分解为明确的逻辑步骤，而不是长成一整段。步骤越清晰、每一步的推理越合理，奖励越高。
            - paragraph [ref=e1809]:
              - text: 在实际训练中，三种奖励函数通常加权组合：
              - code [ref=e1810]: total_reward = w1 × AccuracyReward + w2 × LengthPenaltyReward + w3 × StepReward
              - text: 。
            - heading "SFT 监督微调#" [level=3] [ref=e1811]:
              - text: SFT 监督微调
              - link "#" [ref=e1812] [cursor=pointer]:
                - /url: "#sft-监督微调"
            - paragraph [ref=e1813]: SFT 阶段的目标是”教会模型如何回答”——输出格式、推理模式、使用工具的规范。使用 LoRA 参数高效微调（Qwen3-0.6B + LoRA 仅需约 4GB 显存）。
            - paragraph [ref=e1814]: SFT 的作用：
            - list [ref=e1815]:
              - listitem [ref=e1816]: 建立基线行为：模型学会至少为每个问题生成”看起来合理”的推理轨迹
              - listitem [ref=e1817]: 学习输出格式：模型学会在文本中嵌入推理步骤、工具调用、最终答案的结构
              - listitem [ref=e1818]: 避免 RL 训练初期随机探索的低效：有 SFT 基线之后，RL 可以在”基本可用”的基础上做优化，而不是从零开始探索
            - heading "GRPO 群组相对策略优化#" [level=3] [ref=e1819]:
              - text: GRPO 群组相对策略优化
              - link "#" [ref=e1820] [cursor=pointer]:
                - /url: "#grpo-群组相对策略优化"
            - paragraph [ref=e1821]:
              - text: 与传统 PPO 相比，GRPO 的核心创新是使用
              - strong [ref=e1822]: 组内相对奖励
              - text: 替代 PPO 的优势函数——不需要训练一个独立的 Value Model（价值网络，用来估计状态价值的神经网络），简化了训练流程。
            - paragraph [ref=e1823]:
              - strong [ref=e1824]: 训练流程
              - text: ：
            - list [ref=e1825]:
              - listitem [ref=e1826]: 对同一个输入问题，当前策略模型生成 N 个不同的答案（即一个”群组”，N 通常为 4–8）
              - listitem [ref=e1827]: 使用奖励函数计算每个答案的奖励分数
              - listitem [ref=e1828]: 计算群组内奖励的平均值
              - listitem [ref=e1829]: 对每个答案，计算”相对优势” = 该答案的奖励 - 群组平均奖励
              - listitem [ref=e1830]: 用相对优势作为信号更新策略模型——相对优势为正的答案对应的生成路径被强化，相对优势为负的路径被抑制
            - paragraph [ref=e1831]: GRPO 的设计直觉：不需要一个绝对的价值判断（“这个答案值多少分”），只需要相对比较（“这个答案在这个群组里是更好还是更差”）。相对比较对奖励函数的尺度不敏感，训练更稳定。
            - heading "技术栈#" [level=3] [ref=e1832]:
              - text: 技术栈
              - link "#" [ref=e1833] [cursor=pointer]:
                - /url: "#技术栈"
            - table [ref=e1835]:
              - rowgroup [ref=e1836]:
                - row "层级 组件" [ref=e1837]:
                  - columnheader "层级" [ref=e1838]
                  - columnheader "组件" [ref=e1839]
              - rowgroup [ref=e1840]:
                - row "数据集层 GSM8KDataset, create_sft_dataset(), create_rl_dataset()" [ref=e1841]:
                  - cell "数据集层" [ref=e1842]
                  - cell "GSM8KDataset, create_sft_dataset(), create_rl_dataset()" [ref=e1843]:
                    - text: GSM8KDataset,
                    - code [ref=e1844]: create_sft_dataset()
                    - text: ","
                    - code [ref=e1845]: create_rl_dataset()
                - row "奖励函数层 AccuracyReward, LengthPenaltyReward, StepReward" [ref=e1846]:
                  - cell "奖励函数层" [ref=e1847]
                  - cell "AccuracyReward, LengthPenaltyReward, StepReward" [ref=e1848]
                - row "训练器层 SFTTrainerWrapper, GRPOTrainerWrapper" [ref=e1849]:
                  - cell "训练器层" [ref=e1850]
                  - cell "SFTTrainerWrapper, GRPOTrainerWrapper" [ref=e1851]
                - row "统一接口层 RLTrainingTool" [ref=e1852]:
                  - cell "统一接口层" [ref=e1853]
                  - cell "RLTrainingTool" [ref=e1854]
            - paragraph [ref=e1855]: 技术选型方案为 HuggingFace TRL（Transformer Reinforcement Learning，HuggingFace 官方提供的强化学习训练工具库）+ Qwen3-0.6B 模型。
            - heading "快速上手#" [level=3] [ref=e1856]:
              - text: 快速上手
              - link "#" [ref=e1857] [cursor=pointer]:
                - /url: "#快速上手"
            - generic [ref=e1858]:
              - code [ref=e1860]:
