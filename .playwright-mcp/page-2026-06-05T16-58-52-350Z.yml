            - paragraph [ref=e1286]: 项目中实现三种嵌入方案构成降级链路：DashScopeEmbedding（阿里云通义千问的云端 API，精度最高）→ LocalTransformerEmbedding（使用 Sentence-Transformers 库本地运行，需 GPU）→ TFIDFEmbedding（基于 TF-IDF 的零依赖兜底方案，精度最低但无需任何外部依赖和 GPU）。在 DashScope 不可用时自动降级到 LocalTransformer，再降级到 TFIDF。
