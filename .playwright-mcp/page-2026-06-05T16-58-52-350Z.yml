              - link "#" [ref=e1256] [cursor=pointer]:
                - /url: "#嵌入模型选型"
            - paragraph [ref=e1257]: 嵌入模型（Embedding Model）负责将文本转化为向量，是记忆系统中所有语义检索的基础。选择嵌入模型需考虑以下维度：
